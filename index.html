<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lumen</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%233DDC97%22/></svg>">
<style>
:root {
  --bg:#0b0b0e; --surface:#131318; --surface-2:#1a1a22; --surface-hover:#20202a;
  --border:#232330; --text:#f4f4f6; --text-dim:#9d9dac; --text-faint:#6a6a78;
  --accent:#3DDC97; --accent-soft:rgba(61,220,151,0.16); --danger:#ff6b6b;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Inter','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
}
#app { width:100%; height:100vh; display:flex; flex-direction:column; position:relative; }

/* ---------- Login screen ---------- */
.login-screen {
  position:fixed; inset:0; z-index:500;
  background:radial-gradient(circle at 30% 20%, #16241c 0%, #0b0b0e 60%);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:18px; padding:24px;
}
.login-card { width:100%; max-width:360px; display:flex; flex-direction:column; gap:16px; }
.login-brand { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:6px; }
.login-brand .mark { width:38px; height:38px; border-radius:11px; background:linear-gradient(135deg,var(--accent),#1f6e4f); display:flex; align-items:center; justify-content:center; color:#06140d; font-weight:800; font-size:18px; }
.login-brand .name { font-size:26px; font-weight:800; letter-spacing:-0.02em; }
.login-sub { text-align:center; color:var(--text-dim); font-size:13.5px; line-height:1.5; margin-bottom:8px; }
.login-input {
  width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:10px;
  padding:13px 14px; color:var(--text); font-size:14px; outline:none; transition:border-color .15s;
}
.login-input:focus { border-color:var(--accent); }
.login-btn {
  background:var(--accent); color:#06140d; border:none; border-radius:10px; padding:13px;
  font-size:14px; font-weight:700; cursor:pointer; transition:filter .15s;
}
.login-btn:hover { filter:brightness(1.08); }
.login-btn.secondary { background:var(--surface-2); color:var(--text); border:1px solid var(--border); }
.login-error { color:var(--danger); font-size:12.5px; text-align:center; min-height:16px; }
.login-toggle { text-align:center; font-size:12.5px; color:var(--text-faint); cursor:pointer; text-decoration:underline; }
.guest-link { text-align:center; font-size:12.5px; color:var(--text-faint); margin-top:4px; cursor:pointer; }
.guest-link:hover { color:var(--text-dim); }
.reset-link { text-align:center; font-size:11.5px; color:var(--text-faint); margin-top:10px; cursor:pointer; text-decoration:underline; }
.reset-link:hover { color:var(--text-dim); }
.remember-row { display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--text-dim); cursor:pointer; user-select:none; padding:2px 2px; }
.remember-row input { accent-color:var(--accent); width:14px; height:14px; cursor:pointer; }

/* ---------- Shell ---------- */
.shell { flex:1; display:flex; min-height:0; overflow:hidden; }
.sidebar { width:232px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:18px 12px 14px; gap:18px; }
.brand { display:flex; align-items:center; gap:9px; padding:4px 8px 2px; }
.brand-mark { width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,var(--accent),#1f6e4f); color:#06140d; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:800; }
.brand-name { font-size:19px; font-weight:700; letter-spacing:-0.02em; }
.nav-block { display:flex; flex-direction:column; gap:2px; }
.nav-item { display:flex; align-items:center; gap:12px; padding:9px 10px; border-radius:8px; border:none; background:transparent; color:var(--text-dim); font-size:14px; font-weight:600; cursor:pointer; text-align:left; width:100%; }
.nav-item:hover { background:var(--surface-hover); color:var(--text); }
.nav-item.active { background:var(--surface-2); color:var(--text); }
.library-block { flex:1; display:flex; flex-direction:column; min-height:0; border-top:1px solid var(--border); padding-top:14px; }
.library-head { display:flex; align-items:center; gap:8px; padding:0 10px 10px; color:var(--text-dim); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; }
.library-head span:first-of-type { flex:1; }
.playlist-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:1px; }
.playlist-row { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; border:none; background:transparent; color:var(--text-dim); font-size:13.5px; font-weight:500; cursor:pointer; text-align:left; white-space:nowrap; overflow:hidden; width:100%; }
.playlist-row:hover { background:var(--surface-hover); color:var(--text); }
.playlist-row.active { background:var(--surface-2); color:var(--text); }
.liked-icon { width:22px; height:22px; border-radius:5px; background:linear-gradient(135deg,#6F8CFF,#C77DFF); color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; }
.pl-icon { width:22px; height:22px; border-radius:5px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--text-dim); font-size:11px; }
.sidebar-foot { font-size:11px; line-height:1.5; color:var(--text-faint); padding:10px 10px 0; border-top:1px solid var(--border); }
.owner-badge { display:inline-flex; align-items:center; gap:5px; background:var(--accent-soft); color:var(--accent); font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:20px; margin-bottom:8px; }
.signout-btn { font-size:11px; color:var(--text-faint); cursor:pointer; text-decoration:underline; margin-top:4px; display:inline-block; }
.signout-btn:hover { color:var(--text-dim); }

.main-panel { flex:1; display:flex; flex-direction:column; min-width:0; min-height:0; }
.top-bar { display:flex; align-items:center; justify-content:space-between; padding:16px 28px 8px; flex-shrink:0; gap:12px; }
.search-wrap { display:flex; align-items:center; gap:8px; background:var(--surface-2); border:1px solid var(--border); border-radius:20px; padding:8px 14px; width:280px; color:var(--text-faint); }
.search-wrap input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size:13.5px; font-family:inherit; }
.scroll-area { flex:1; overflow-y:auto; padding:12px 28px 28px; }
.section { margin-bottom:30px; }
.section-title { font-size:19px; font-weight:700; letter-spacing:-0.01em; margin-bottom:14px; }
.card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; }
.song-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px; display:flex; flex-direction:column; gap:10px; cursor:pointer; text-align:left; transition:background .15s; }
.song-card:hover { background:var(--surface-2); }
.card-art { width:100%; aspect-ratio:1; border-radius:7px; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.85); position:relative; font-size:24px; }
.card-play { position:absolute; bottom:6px; right:6px; width:30px; height:30px; border-radius:50%; background:var(--accent); color:#06140d; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s; box-shadow:0 6px 16px rgba(0,0,0,.4); }
.song-card:hover .card-play { opacity:1; }
.card-title { font-size:13.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.card-artist { font-size:12px; color:var(--text-faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.song-table { display:flex; flex-direction:column; }
.table-head, .table-row { display:grid; grid-template-columns:40px 1fr 180px 70px 88px; align-items:center; gap:14px; padding:8px 10px; }
.table-head { color:var(--text-faint); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid var(--border); margin-bottom:4px; }
.table-row { border-radius:7px; }
.table-row:hover { background:var(--surface-2); }
.col-idx { display:flex; align-items:center; justify-content:center; color:var(--text-faint); font-size:13px; }
.idx-play { display:none; background:transparent; border:none; color:var(--text); cursor:pointer; align-items:center; justify-content:center; }
.table-row:hover .idx-num { display:none; } .table-row:hover .idx-play { display:flex; }
.col-title { display:flex; align-items:center; gap:10px; overflow:hidden; cursor:pointer; }
.mini-art { width:34px; height:34px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:rgba(0,0,0,.55); flex-shrink:0; font-size:13px; }
.title-text { display:flex; flex-direction:column; overflow:hidden; min-width:0; }
.song-name { font-size:13.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.song-name.accent { color:var(--accent); }
.song-artist { font-size:12px; color:var(--text-faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.col-album { font-size:13px; color:var(--text-faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.col-dur { font-size:13px; color:var(--text-faint); text-align:right; }
.col-actions { display:flex; align-items:center; justify-content:flex-end; gap:4px; position:relative; }

.icon-btn { background:transparent; border:none; color:var(--text-dim); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s,color .15s; font-size:15px; }
.icon-btn:hover { color:var(--text); background:var(--surface-hover); }
.icon-btn:disabled { opacity:.35; cursor:default; }
.icon-btn.small { width:26px; height:26px; font-size:13px; }
.icon-btn.toggled { color:var(--accent); }
.heart-btn.liked { color:var(--accent); }
.primary-btn { display:inline-flex; align-items:center; gap:8px; background:var(--accent); color:#06140d; border:none; border-radius:22px; padding:10px 20px; font-size:13.5px; font-weight:700; cursor:pointer; }
.primary-btn:hover { filter:brightness(1.08); }

.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:80px 24px; gap:10px; color:var(--text-dim); }
.empty-art { width:64px; height:64px; border-radius:50%; background:var(--surface-2); display:flex; align-items:center; justify-content:center; color:var(--text-faint); margin-bottom:6px; font-size:28px; }
.empty-state h2 { font-size:18px; color:var(--text); }
.empty-state p { font-size:13.5px; max-width:360px; line-height:1.5; }

.playlist-hero { display:flex; align-items:flex-end; gap:20px; padding:24px 28px 26px; margin:-12px -28px 20px; }
.hero-art { width:120px; height:120px; border-radius:10px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; color:var(--text-faint); flex-shrink:0; box-shadow:0 10px 30px rgba(0,0,0,.4); font-size:42px; }
.liked-art { background:linear-gradient(135deg,#6F8CFF,#C77DFF); color:#fff; }
.hero-info { display:flex; flex-direction:column; gap:6px; }
.hero-kicker { font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim); }
.hero-title { font-size:34px; font-weight:800; letter-spacing:-0.02em; cursor:pointer; }
.hero-meta { font-size:13px; color:var(--text-dim); }

.player-bar { flex-shrink:0; height:84px; background:var(--surface); border-top:1px solid var(--border); display:grid; grid-template-columns:1fr 2fr 1fr; align-items:center; padding:0 18px; gap:16px; }
.player-left { display:flex; align-items:center; gap:12px; min-width:0; }
.player-art { width:50px; height:50px; border-radius:7px; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.85); flex-shrink:0; font-size:18px; }
.player-meta { display:flex; flex-direction:column; min-width:0; overflow:hidden; }
.player-meta.idle .player-title { color:var(--text-dim); }
.player-title { font-size:13.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.player-artist { font-size:12px; color:var(--text-faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.player-center { display:flex; flex-direction:column; align-items:center; gap:6px; max-width:560px; margin:0 auto; width:100%; }
.transport { display:flex; align-items:center; gap:6px; }
.play-btn { width:34px; height:34px; border-radius:50%; background:var(--text); color:#0b0b0e; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px; }
.play-btn:hover { transform:scale(1.06); }
.play-btn:disabled { opacity:.4; cursor:default; }
.seek-row { display:flex; align-items:center; gap:9px; width:100%; }
.time { font-size:11px; color:var(--text-faint); width:36px; text-align:center; flex-shrink:0; font-variant-numeric:tabular-nums; }
.seek-track { flex:1; height:12px; display:flex; align-items:center; cursor:pointer; position:relative; }
.seek-track::before { content:''; position:absolute; left:0; right:0; height:4px; border-radius:2px; background:var(--surface-2); }
.seek-fill { position:absolute; left:0; height:4px; border-radius:2px; background:var(--text); pointer-events:none; }
.seek-thumb { position:absolute; width:11px; height:11px; border-radius:50%; background:var(--text); transform:translateX(-50%); pointer-events:none; }
.player-right { display:flex; align-items:center; justify-content:flex-end; gap:8px; }
.vol-track { width:90px; height:12px; display:flex; align-items:center; cursor:pointer; position:relative; }
.vol-track::before { content:''; position:absolute; left:0; right:0; height:4px; border-radius:2px; background:var(--surface-2); }
.vol-fill { position:absolute; left:0; height:4px; border-radius:2px; background:var(--text); pointer-events:none; }

.menu-wrap { position:relative; }
.dropdown { position:absolute; right:0; top:32px; background:var(--surface-2); border:1px solid var(--border); border-radius:8px; min-width:190px; padding:6px; z-index:30; box-shadow:0 12px 28px rgba(0,0,0,.5); }
.dropdown-label { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text-faint); padding:6px 8px 4px; }
.dropdown-item { display:flex; align-items:center; gap:8px; width:100%; text-align:left; background:transparent; border:none; color:var(--text); font-size:13px; padding:7px 8px; border-radius:5px; cursor:pointer; }
.dropdown-item:hover { background:var(--surface-hover); }
.dropdown-item.danger { color:var(--danger); }
.dropdown-empty { font-size:12px; color:var(--text-faint); padding:6px 8px; }
.dropdown-divider { height:1px; background:var(--border); margin:5px 2px; }
.transition-dropdown { width:230px; }
.dropdown-foot-note { font-size:11px; line-height:1.45; color:var(--text-faint); padding:8px 8px 4px; border-top:1px solid var(--border); margin-top:4px; }

.modal-veil { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(2px); }
.modal-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:420px; max-width:90vw; padding:20px; box-shadow:0 24px 60px rgba(0,0,0,.55); }
.modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.modal-head h3 { font-size:16px; font-weight:700; }
.upload-zone { border:1.5px dashed var(--border); border-radius:10px; padding:34px 18px; display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center; color:var(--text-dim); cursor:pointer; transition:border-color .15s,background .15s; }
.upload-zone:hover, .upload-zone.drag { border-color:var(--accent); background:var(--accent-soft); color:var(--text); }
.upload-main { font-size:13.5px; font-weight:600; }
.upload-sub { font-size:12px; color:var(--text-faint); }
.modal-foot { font-size:11.5px; color:var(--text-faint); margin-top:14px; line-height:1.5; }

.drop-veil { position:fixed; inset:0; background:rgba(8,8,10,.82); z-index:300; display:flex; align-items:center; justify-content:center; }
.drop-card { display:flex; flex-direction:column; align-items:center; gap:10px; color:var(--text); border:2px dashed var(--accent); border-radius:16px; padding:40px 60px; }

.toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--surface-2); border:1px solid var(--border); color:var(--text); font-size:13px; font-weight:600; padding:10px 18px; border-radius:10px; z-index:400; box-shadow:0 10px 24px rgba(0,0,0,.4); display:flex; align-items:center; gap:8px; }
.spin { display:inline-block; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

::-webkit-scrollbar { width:8px; }
::-webkit-scrollbar-thumb { background:var(--surface-2); border-radius:4px; }
::-webkit-scrollbar-track { background:transparent; }

@media (max-width: 760px) {
  .sidebar { display:none; }
  .top-bar { padding:12px 16px 6px; }
  .search-wrap { width:auto; flex:1; }
  .scroll-area { padding:8px 16px 24px; }
  .card-grid { grid-template-columns:repeat(2,1fr); }
  .table-head .col-album, .table-row .col-album { display:none; }
  .table-head, .table-row { grid-template-columns:32px 1fr 60px 70px; }
  .player-bar { grid-template-columns:1fr auto; height:74px; padding:0 12px; }
  .player-center { display:none; }
  .player-right { gap:4px; }
  .vol-track { display:none; }
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =========================================================================
   LUMEN — standalone website edition
   - Plain JS, no build step, no React. Single-file so it's trivial to host.
   - Audio playback uses a normal <audio> element (most reliable approach;
     avoids the AudioContext/iframe issues from the artifact sandbox).
   - Songs (as base64) + playlists + the owner credential all live in
     IndexedDB in this browser. "Owner" = whoever knows the password.
   ========================================================================= */

// ---------- tiny IndexedDB wrapper ----------
const DB_NAME = "lumen-db";
const DB_VERSION = 1;
let dbPromise = null;
function getDB() {
  if (dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains("songs")) db.createObjectStore("songs", { keyPath: "id" });
      if (!db.objectStoreNames.contains("meta")) db.createObjectStore("meta", { keyPath: "key" });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return dbPromise;
}
async function idbGetAll(store) {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readonly");
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}
async function idbPut(store, value) {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readwrite");
    tx.objectStore(store).put(value);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbDelete(store, key) {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readwrite");
    tx.objectStore(store).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbGet(store, key) {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readonly");
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// ---------- crypto helper for password hashing ----------
async function sha256(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

// ---------- helpers ----------
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function formatTime(sec) {
  if (!sec || isNaN(sec)) return "0:00";
  const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, "0")}`;
}
const ACCENTS = ["#3DDC97","#FF6B6B","#FFD166","#6F8CFF","#C77DFF","#FF8FAB"];
function colorFor(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
  return ACCENTS[h % ACCENTS.length];
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result); // data: URL, directly usable as <audio src>
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---------- app state ----------
const state = {
  isOwner: false,
  ownerExists: false,
  authChecked: false,
  songs: [],          // { id, title, artist, album, duration, color, addedAt, dataUrl }
  playlists: [{ id: "liked", name: "Liked Songs", songIds: [] }],
  view: { screen: "home", playlistId: null },
  queue: [],
  queueIndex: 0,
  isPlaying: false,
  progress: 0,
  duration: 0,
  volume: 0.8,
  muted: false,
  shuffle: false,
  repeat: false,
  searchTerm: "",
  transitionMode: "short", // off | short | long | gapless
  showUploadModal: false,
  showTransitionMenu: false,
  showSongMenuFor: null,
  toast: null,
};

const FADE_MS = { off: 0, short: 4000, long: 9000, gapless: 0 };
const TRANSITION_LABELS = { off: "No transition", short: "Crossfade (4s)", long: "Crossfade (9s)", gapless: "Gapless" };

// ---------- audio engine: two <audio> elements for crossfade ----------
const deckA = new Audio();
const deckB = new Audio();
[deckA, deckB].forEach(d => { d.preload = "auto"; });
let activeDeck = deckA, standbyDeck = deckB;
let transitioning = false;
let preparedSongId = null;
let rafId = null;

function currentSong() {
  return state.queue.length ? state.songs.find(s => s.id === state.queue[state.queueIndex]) : null;
}

function applyVolume() {
  const v = state.muted ? 0 : state.volume;
  activeDeck.volume = v;
}

function loadFresh(song, autoplay) {
  transitioning = false;
  preparedSongId = null;
  standbyDeck.pause();
  standbyDeck.removeAttribute("src");
  activeDeck.src = song.dataUrl;
  activeDeck.dataset.songId = song.id;
  activeDeck.currentTime = 0;
  applyVolume();
  if (autoplay) activeDeck.play().catch(() => { state.isPlaying = false; render(); });
}

function prepareNext() {
  const next = peekNextSong();
  if (!next) { preparedSongId = null; return; }
  if (preparedSongId === next.id) return;
  standbyDeck.src = next.dataUrl;
  standbyDeck.dataset.songId = next.id;
  standbyDeck.currentTime = 0;
  standbyDeck.load();
  preparedSongId = next.id;
}

function peekNextSong() {
  if (!state.queue.length) return null;
  let idx;
  if (state.shuffle) idx = (state.queueIndex + 1) % state.queue.length;
  else {
    idx = state.queueIndex + 1;
    if (idx >= state.queue.length) idx = state.repeat ? 0 : -1;
  }
  if (idx < 0) return null;
  return state.songs.find(s => s.id === state.queue[idx]) || null;
}

function beginTransition() {
  if (transitioning || !preparedSongId) return false;
  const fadeMs = FADE_MS[state.transitionMode];
  transitioning = true;
  const outDeck = activeDeck, inDeck = standbyDeck;

  inDeck.volume = fadeMs > 0 ? 0 : (state.muted ? 0 : state.volume);
  inDeck.currentTime = 0;
  inDeck.play().catch(() => {});

  if (fadeMs > 0) {
    const steps = 20;
    const stepTime = fadeMs / steps;
    let i = 0;
    const targetVol = state.muted ? 0 : state.volume;
    const fadeTimer = setInterval(() => {
      i++;
      const t = i / steps;
      outDeck.volume = Math.max(0, targetVol * (1 - t));
      inDeck.volume = Math.min(targetVol, targetVol * t);
      if (i >= steps) {
        clearInterval(fadeTimer);
        outDeck.pause();
        outDeck.currentTime = 0;
        finishTransition(outDeck, inDeck);
      }
    }, stepTime);
  } else {
    outDeck.pause();
    outDeck.currentTime = 0;
    finishTransition(outDeck, inDeck);
  }
  return true;
}

function finishTransition(outDeck, inDeck) {
  activeDeck = inDeck;
  standbyDeck = outDeck;
  transitioning = false;
  preparedSongId = null;
  const songId = activeDeck.dataset.songId;
  const idx = state.queue.indexOf(songId);
  if (idx >= 0) state.queueIndex = idx;
  prepareNext();
  render();
}

function tick() {
  const dur = activeDeck.duration;
  const cur = activeDeck.currentTime;
  if (dur && !isNaN(dur)) {
    state.progress = cur;
    state.duration = dur;
    const remaining = dur - cur;
    const fadeMs = FADE_MS[state.transitionMode];
    const window_ = fadeMs > 0 ? fadeMs / 1000 + 0.4 : 0.25;
    if (!transitioning && remaining <= window_ && remaining > 0) {
      if (preparedSongId) beginTransition();
    }
    updateProgressUI();
  }
  rafId = requestAnimationFrame(tick);
}
rafId = requestAnimationFrame(tick);

// Lightweight UI updates for the progress bar (avoid full re-render every frame)
function updateProgressUI() {
  const fill = document.querySelector(".seek-fill");
  const thumb = document.querySelector(".seek-thumb");
  const timeEls = document.querySelectorAll(".player-bar .time");
  if (fill && state.duration) {
    const pct = (state.progress / state.duration) * 100;
    fill.style.width = pct + "%";
    if (thumb) thumb.style.left = pct + "%";
    if (timeEls[0]) timeEls[0].textContent = formatTime(state.progress);
    if (timeEls[1]) timeEls[1].textContent = formatTime(state.duration);
  }
}

activeDeck.addEventListener("ended", () => {
  if (transitioning) return;
  handleNext(true);
});
deckA.addEventListener("play", () => { if (activeDeck === deckA) { state.isPlaying = true; } });
deckB.addEventListener("play", () => { if (activeDeck === deckB) { state.isPlaying = true; } });

// ---------- playback controls ----------
function playSongList(list, startId) {
  state.queue = list.map(s => s.id);
  state.queueIndex = Math.max(0, state.queue.indexOf(startId));
  const song = currentSong();
  if (song) {
    loadFresh(song, true);
    state.isPlaying = true;
    prepareNext();
  }
  render();
}

function togglePlay() {
  const song = currentSong();
  if (!song) {
    if (state.songs.length) playSongList(state.songs, state.songs[0].id);
    return;
  }
  if (state.isPlaying) {
    activeDeck.pause();
    state.isPlaying = false;
  } else {
    activeDeck.play().catch(() => {});
    state.isPlaying = true;
  }
  render();
}

function handleNext(auto) {
  if (!state.queue.length) return;
  if (state.repeat && auto && state.queue.length === 1) {
    activeDeck.currentTime = 0;
    activeDeck.play();
    return;
  }
  // If a transition is already prepared for the right next song, let it happen naturally
  if (!auto && preparedSongId) {
    const started = beginTransition();
    if (started) return;
  }
  let next = state.shuffle ? Math.floor(Math.random() * state.queue.length) : state.queueIndex + 1;
  if (next >= state.queue.length) {
    if (!state.repeat) { state.isPlaying = false; render(); return; }
    next = 0;
  }
  state.queueIndex = next;
  const song = currentSong();
  if (song) { loadFresh(song, true); state.isPlaying = true; prepareNext(); }
  render();
}

function handlePrev() {
  if (activeDeck.currentTime > 3) {
    activeDeck.currentTime = 0;
    return;
  }
  const prev = state.queueIndex - 1 < 0 ? state.queue.length - 1 : state.queueIndex - 1;
  state.queueIndex = prev;
  const song = currentSong();
  if (song) { loadFresh(song, true); state.isPlaying = true; prepareNext(); }
  render();
}

function seekTo(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
  if (state.duration) {
    activeDeck.currentTime = pct * state.duration;
    state.progress = activeDeck.currentTime;
  }
}

function toggleLiked(songId) {
  const liked = state.playlists.find(p => p.id === "liked");
  const has = liked.songIds.includes(songId);
  liked.songIds = has ? liked.songIds.filter(id => id !== songId) : [songId, ...liked.songIds];
  savePlaylists();
  render();
}
function isLiked(songId) { return state.playlists.find(p => p.id === "liked").songIds.includes(songId); }

function createPlaylist() {
  const id = uid();
  state.playlists.push({ id, name: `Playlist ${state.playlists.length}`, songIds: [] });
  state.view = { screen: "playlist", playlistId: id };
  savePlaylists();
  render();
}
function renamePlaylist(id, name) {
  const p = state.playlists.find(p => p.id === id);
  if (p) p.name = name;
  savePlaylists();
}
function addToPlaylist(pid, sid) {
  const p = state.playlists.find(p => p.id === pid);
  if (p && !p.songIds.includes(sid)) p.songIds.push(sid);
  savePlaylists();
  showToast("Added to playlist");
  render();
}
async function savePlaylists() {
  await idbPut("meta", { key: "playlists", value: state.playlists });
}

function showToast(msg) {
  state.toast = msg;
  render();
  setTimeout(() => { state.toast = null; render(); }, 2400);
}

// ---------- file upload ----------
async function handleFiles(fileList) {
  const files = Array.from(fileList).filter(f =>
    f.type.startsWith("audio/") || /\.(mp3|wav|ogg|m4a|aac|flac)$/i.test(f.name)
  );
  if (!files.length) { showToast("No supported audio files found"); return; }
  state.showUploadModal = false;
  render();

  for (const file of files) {
    try {
      const dataUrl = await fileToBase64(file);
      const dur = await probeDuration(dataUrl);
      const rawName = file.name.replace(/\.[^/.]+$/, "");
      let title = rawName, artist = "Unknown artist";
      if (rawName.includes(" - ")) {
        const [a, b] = rawName.split(" - ");
        artist = a.trim(); title = b.trim();
      }
      const id = uid();
      const song = { id, title, artist, album: "Local upload", duration: dur, color: colorFor(rawName + id), addedAt: Date.now(), dataUrl };
      state.songs.unshift(song);
      await idbPut("songs", song);
    } catch (e) {
      console.error("Upload error", file.name, e);
      showToast(`Couldn't add ${file.name}`);
    }
  }
  showToast(`Added ${files.length} song${files.length > 1 ? "s" : ""}`);
  render();
}

function probeDuration(dataUrl) {
  return new Promise(resolve => {
    const a = new Audio();
    a.preload = "metadata";
    a.src = dataUrl;
    a.addEventListener("loadedmetadata", () => resolve(a.duration || 0));
    a.addEventListener("error", () => resolve(0));
  });
}

async function removeSong(id) {
  state.songs = state.songs.filter(s => s.id !== id);
  state.playlists.forEach(p => { p.songIds = p.songIds.filter(sid => sid !== id); });
  state.queue = state.queue.filter(sid => sid !== id);
  await idbDelete("songs", id);
  await savePlaylists();
  showToast("Removed");
  render();
}

// ---------- owner auth ----------
const OWNER_META_KEY = "owner-credentials"; // { username, passwordHash }
const SESSION_KEY = "lumen-session-owner";

async function checkOwnerExists() {
  const rec = await idbGet("meta", OWNER_META_KEY);
  state.ownerExists = !!rec?.value?.username;
  return state.ownerExists;
}

async function setOwnerCredentials(username, password) {
  const hash = await sha256(password);
  await idbPut("meta", { key: OWNER_META_KEY, value: { username, passwordHash: hash } });
  state.ownerExists = true;
  state.isOwner = true;
  sessionStorage.setItem(SESSION_KEY, "1");
}

async function attemptLogin(username, password) {
  const rec = await idbGet("meta", OWNER_META_KEY);
  if (!rec?.value?.username) return false;
  const hash = await sha256(password);
  const userMatches = rec.value.username.trim().toLowerCase() === username.trim().toLowerCase();
  if (userMatches && hash === rec.value.passwordHash) {
    state.isOwner = true;
    sessionStorage.setItem(SESSION_KEY, "1");
    return true;
  }
  return false;
}

function signOut() {
  state.isOwner = false;
  sessionStorage.removeItem(SESSION_KEY);
  localStorage.removeItem(SESSION_KEY);
  render();
}

// ---------- initial load ----------
async function init() {
  await checkOwnerExists();
  if (sessionStorage.getItem(SESSION_KEY) === "1" || localStorage.getItem(SESSION_KEY) === "1") state.isOwner = true;

  const songs = await idbGetAll("songs");
  state.songs = songs.sort((a, b) => b.addedAt - a.addedAt);

  const plRec = await idbGet("meta", "playlists");
  if (plRec?.value) state.playlists = plRec.value;

  state.authChecked = true;
  render();
}

// =========================================================================
// RENDER
// =========================================================================
function render() {
  const app = document.getElementById("app");

  if (!state.authChecked) {
    app.innerHTML = `<div class="login-screen"><div class="spin" style="font-size:24px;">◐</div></div>`;
    return;
  }

  if (!state.isOwner && !window.__guestMode) {
    app.innerHTML = renderLogin();
    wireLoginEvents();
    return;
  }

  app.innerHTML = renderApp();
  wireAppEvents();
}

function renderLogin() {
  if (!state.ownerExists) {
    return `
      <div class="login-screen">
        <div class="login-card">
          <div class="login-brand"><div class="mark">L</div><div class="name">Lumen</div></div>
          <p class="login-sub">No owner is set up yet. Choose a username and password — only this login will be able to add or remove songs.</p>
          <input type="text" id="setup-user" class="login-input" placeholder="Choose a username" autofocus autocomplete="username">
          <input type="password" id="setup-pass" class="login-input" placeholder="Choose a password" autocomplete="new-password">
          <input type="password" id="setup-pass-confirm" class="login-input" placeholder="Confirm password" autocomplete="new-password">
          <div class="login-error" id="login-error"></div>
          <button class="login-btn" id="setup-btn">Set up owner account</button>
          <div class="guest-link" id="guest-link">Continue as guest (listen only)</div>
        </div>
      </div>`;
  }
  return `
    <div class="login-screen">
      <div class="login-card">
        <div class="login-brand"><div class="mark">L</div><div class="name">Lumen</div></div>
        <p class="login-sub">Sign in as owner to add or manage songs.</p>
        <input type="text" id="login-user" class="login-input" placeholder="Username" autofocus autocomplete="username">
        <input type="password" id="login-pass" class="login-input" placeholder="Password" autocomplete="current-password">
        <label class="remember-row"><input type="checkbox" id="remember-me"> Stay signed in on this device</label>
        <div class="login-error" id="login-error"></div>
        <button class="login-btn" id="login-btn">Sign in</button>
        <div class="guest-link" id="guest-link">Continue as guest (listen only)</div>
        <div class="reset-link" id="reset-link">Forgot your password?</div>
      </div>
    </div>`;
}

function wireLoginEvents() {
  const guestLink = document.getElementById("guest-link");
  if (guestLink) guestLink.onclick = () => { window.__guestMode = true; render(); };

  const setupBtn = document.getElementById("setup-btn");
  if (setupBtn) {
    setupBtn.onclick = async () => {
      const u = document.getElementById("setup-user").value.trim();
      const p1 = document.getElementById("setup-pass").value;
      const p2 = document.getElementById("setup-pass-confirm").value;
      const err = document.getElementById("login-error");
      if (!u || u.length < 3) { err.textContent = "Username must be at least 3 characters."; return; }
      if (!p1 || p1.length < 4) { err.textContent = "Password must be at least 4 characters."; return; }
      if (p1 !== p2) { err.textContent = "Passwords don't match."; return; }
      await setOwnerCredentials(u, p1);
      render();
    };
  }

  const loginBtn = document.getElementById("login-btn");
  if (loginBtn) {
    const doLogin = async () => {
      const user = document.getElementById("login-user").value;
      const pass = document.getElementById("login-pass").value;
      const remember = document.getElementById("remember-me")?.checked;
      const err = document.getElementById("login-error");
      const ok = await attemptLogin(user, pass);
      if (!ok) { err.textContent = "Incorrect username or password."; return; }
      if (remember) localStorage.setItem(SESSION_KEY, "1");
      render();
    };
    loginBtn.onclick = doLogin;
    document.getElementById("login-pass").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
    document.getElementById("login-user").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("login-pass").focus(); });
  }

  const resetLink = document.getElementById("reset-link");
  if (resetLink) {
    resetLink.onclick = async () => {
      const rec = await idbGet("meta", OWNER_META_KEY);
      const hint = rec?.value?.username ? `The owner username is "${rec.value.username}". ` : "";
      const sure = confirm(`${hint}Resetting will erase the current owner login (songs and playlists stay). Continue?`);
      if (!sure) return;
      await idbDelete("meta", OWNER_META_KEY);
      state.ownerExists = false;
      render();
    };
  }
}

}

function renderPlayerBar(song) {
  const pct = state.duration ? (state.progress / state.duration) * 100 : 0;
  return `
    <footer class="player-bar">
      <div class="player-left">
        ${song ? `
          <div class="player-art" style="background:linear-gradient(135deg,${song.color},#14141a)">♪</div>
          <div class="player-meta">
            <span class="player-title">${escapeHtml(song.title)}</span>
            <span class="player-artist">${escapeHtml(song.artist)}</span>
          </div>
          <button class="icon-btn small heart-btn ${isLiked(song.id) ? "liked" : ""}" data-action="toggle-liked" data-id="${song.id}">${isLiked(song.id) ? "♥" : "♡"}</button>
        ` : `<div class="player-meta idle"><span class="player-title">Nothing playing</span><span class="player-artist">Add songs to start a queue</span></div>`}
      </div>
      <div class="player-center">
        <div class="transport">
          <button class="icon-btn ${state.shuffle ? "toggled" : ""}" data-action="toggle-shuffle">⤨</button>
          <button class="icon-btn" data-action="prev" ${!state.queue.length ? "disabled" : ""}>⏮</button>
          <button class="play-btn" data-action="toggle-play" ${!song ? "disabled" : ""}>${state.isPlaying ? "❙❙" : "▶"}</button>
          <button class="icon-btn" data-action="next" ${!state.queue.length ? "disabled" : ""}>⏭</button>
          <button class="icon-btn ${state.repeat ? "toggled" : ""}" data-action="toggle-repeat">⟲</button>
        </div>
        <div class="seek-row">
          <span class="time">${formatTime(state.progress)}</span>
          <div class="seek-track" data-action="seek"><div class="seek-fill" style="width:${pct}%"></div><div class="seek-thumb" style="left:${pct}%"></div></div>
          <span class="time">${formatTime(state.duration)}</span>
        </div>
      </div>
      <div class="player-right">
        <div class="menu-wrap">
          <button class="icon-btn small ${state.transitionMode !== "off" ? "toggled" : ""}" data-action="toggle-transition-menu" title="Track transition">∿</button>
          ${state.showTransitionMenu ? `
            <div class="dropdown transition-dropdown">
              <div class="dropdown-label">Track transitions</div>
              ${Object.entries(TRANSITION_LABELS).map(([key, label]) => `
                <button class="dropdown-item" data-action="set-transition" data-mode="${key}">
                  <span style="width:14px;display:inline-block;color:var(--accent)">${state.transitionMode === key ? "✓" : ""}</span>${label}
                </button>`).join("")}
              <div class="dropdown-foot-note">Crossfade overlaps tracks. Gapless switches instantly with no silence.</div>
            </div>` : ""}
        </div>
        <button class="icon-btn" data-action="toggle-mute">${state.muted || state.volume === 0 ? "🔇" : "🔊"}</button>
        <div class="vol-track" data-action="set-volume"><div class="vol-fill" style="width:${(state.muted ? 0 : state.volume) * 100}%"></div></div>
      </div>
    </footer>`;
}

function renderUploadModal() {
  return `
    <div class="modal-veil" data-action="close-upload">
      <div class="modal-card" data-stop-propagation>
        <div class="modal-head"><h3>Add songs to Lumen</h3><button class="icon-btn small" data-action="close-upload">✕</button></div>
        <div class="upload-zone" id="upload-zone">
          <span style="font-size:26px;">⬆</span>
          <p class="upload-main">Drop audio files here, or click to browse</p>
          <p class="upload-sub">MP3, WAV, M4A, OGG — name files "Artist - Title" for best results</p>
        </div>
        <input type="file" id="file-input" accept="audio/*,.mp3,.wav,.ogg,.m4a,.aac,.flac" multiple style="display:none">
        <p class="modal-foot">Files are stored in this browser's local database. As owner, anything you add here is what everyone using this browser sees.</p>
      </div>
    </div>`;
}

// =========================================================================
// EVENT WIRING (event delegation — re-wired on every render)
// =========================================================================
function wireAppEvents() {
  document.querySelectorAll("[data-action]").forEach(el => {
    el.addEventListener("click", handleAction);
  });

  const searchInput = document.getElementById("search-input");
  if (searchInput) {
    searchInput.addEventListener("input", e => {
      state.searchTerm = e.target.value;
      const cursorPos = e.target.selectionStart;
      render();
      const newInput = document.getElementById("search-input");
      if (newInput) { newInput.focus(); newInput.setSelectionRange(cursorPos, cursorPos); }
    });
  }

  const signoutBtn = document.getElementById("signout-btn");
  if (signoutBtn) signoutBtn.onclick = signOut;

  const fileInput = document.getElementById("file-input");
  const uploadZone = document.getElementById("upload-zone");
  if (uploadZone && fileInput) {
    uploadZone.addEventListener("click", () => fileInput.click());
    uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("drag"); });
    uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag"));
    uploadZone.addEventListener("drop", e => {
      e.preventDefault(); uploadZone.classList.remove("drag");
      if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
    });
  }
  if (fileInput) fileInput.addEventListener("change", e => { if (e.target.files.length) handleFiles(e.target.files); });

  // global drag/drop onto the whole app
  if (state.isOwner) {
    document.body.ondragover = e => e.preventDefault();
    document.body.ondrop = e => {
      e.preventDefault();
      if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
    };
  }
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;
  const id = el.dataset.id;

  // Don't let clicks on the modal-card bubble to the veil's close handler
  if (el.dataset.stopPropagation !== undefined) e.stopPropagation();

  switch (action) {
    case "go-home": state.view = { screen: "home", playlistId: null }; render(); break;
    case "open-upload": if (state.isOwner) { state.showUploadModal = true; render(); } break;
    case "close-upload": state.showUploadModal = false; render(); break;
    case "create-playlist": createPlaylist(); break;
    case "open-playlist": state.view = { screen: "playlist", playlistId: id }; render(); break;
    case "rename-playlist": {
      const p = state.playlists.find(p => p.id === id);
      const name = prompt("Rename playlist", p?.name || "");
      if (name && name.trim()) renamePlaylist(id, name.trim());
      render();
      break;
    }
    case "play-song": {
      const list = state.view.screen === "playlist"
        ? state.playlists.find(p => p.id === state.view.playlistId).songIds.map(sid => state.songs.find(s => s.id === sid)).filter(Boolean)
        : (state.searchTerm ? state.songs.filter(s => s.title.toLowerCase().includes(state.searchTerm.toLowerCase()) || s.artist.toLowerCase().includes(state.searchTerm.toLowerCase())) : state.songs);
      playSongList(list, id);
      break;
    }
    case "toggle-play": togglePlay(); break;
    case "next": handleNext(false); break;
    case "prev": handlePrev(); break;
    case "seek": seekTo(e); break;
    case "toggle-shuffle": state.shuffle = !state.shuffle; prepareNext(); render(); break;
    case "toggle-repeat": state.repeat = !state.repeat; prepareNext(); render(); break;
    case "toggle-mute": state.muted = !state.muted; applyVolume(); render(); break;
    case "set-volume": {
      const rect = el.getBoundingClientRect();
      state.volume = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
      state.muted = false;
      applyVolume();
      render();
      break;
    }
    case "toggle-liked": toggleLiked(id); break;
    case "toggle-song-menu": state.showSongMenuFor = state.showSongMenuFor === id ? null : id; render(); break;
    case "add-to-playlist": addToPlaylist(el.dataset.pid, el.dataset.sid); state.showSongMenuFor = null; break;
    case "delete-song": if (state.isOwner) { state.showSongMenuFor = null; removeSong(id); } break;
    case "remove-from-playlist": {
      const pid = el.dataset.pid;
      const p = state.playlists.find(p => p.id === pid);
      if (p) p.songIds = p.songIds.filter(sid => sid !== id);
      savePlaylists();
      state.showSongMenuFor = null;
      render();
      break;
    }
    case "toggle-transition-menu": state.showTransitionMenu = !state.showTransitionMenu; render(); break;
    case "set-transition": state.transitionMode = el.dataset.mode; state.showTransitionMenu = false; render(); break;
  }
}

// close dropdowns when clicking outside
document.addEventListener("click", e => {
  if (!e.target.closest(".menu-wrap")) {
    if (state.showSongMenuFor || state.showTransitionMenu) {
      state.showSongMenuFor = null;
      state.showTransitionMenu = false;
      render();
    }
  }
});

init();
</script>
</body>
</html>
