<style>

* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Inter','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
}
#app { width:100%; height:100vh; display:flex; flex-direction:column; position:relative; }

.login-screen {

  overflow-y:auto;
}
.login-card { width:100%; max-width:360px; display:flex; flex-direction:column; gap:14px; }

}
.login-input:focus { border-color:var(--accent); }
.login-btn {
  background:var(--accent); color:#06140d; border:none; border-radius:10px; padding:13px;
  font-size:14px; font-weight:700; cursor:pointer; transition:filter .15s;
}
.login-btn:hover { filter:brightness(1.08); }

.shell { flex:1; display:flex; min-height:0; overflow:hidden; }

.brand { display:flex; align-items:center; gap:9px; padding:4px 8px 2px; }

.main-panel { flex:1; display:flex; flex-direction:column; min-width:0; min-height:0; }
.top-bar { display:flex; align-items:center; justify-content:space-between; padding:16px 28px 8px; flex-shrink:0; gap:12px; }

.song-table { display:flex; flex-direction:column; }
.table-head, .table-row { display:grid; grid-template-columns:40px 1fr 180px 70px 88px; align-items:center; gap:14px; padding:8px 10px; }
.table-head { color:var(--text-faint); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid var(--border); margin-bottom:4px; }
.table-row { border-radius:7px; }
.table-row:hover { background:var(--surface-2); }
.table-row.missing { opacity:.45; }
.col-idx { display:flex; align-items:center; justify-content:center; color:var(--text-faint); font-size:13px; }
.idx-play { display:none; background:transparent; border:none; color:var(--text); cursor:pointer; align-items:center; justify-content:center; }
.table-row:hover .idx-num { display:none; } .table-row:hover .idx-play { display:flex; }

.icon-btn { background:transparent; border:none; color:var(--text-dim); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s,color .15s; font-size:15px; font-family:inherit; }

.icon-btn.small { width:26px; height:26px; font-size:13px; }
.icon-btn.toggled { color:var(--accent); }
.heart-btn.liked { color:var(--accent); }
.primary-btn { display:inline-flex; align-items:center; gap:8px; background:var(--accent); color:#06140d; border:none; border-radius:22px; padding:10px 20px; font-size:13.5px; font-weight:700; cursor:pointer; font-family:inherit; }
.primary-btn:hover { filter:brightness(1.08); }

.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:80px 24px; gap:10px; color:var(--text-dim); }
.empty-art { width:64px; height:64px; border-radius:50%; background:var(--surface-2); display:flex; align-items:center; justify-content:center; color:var(--text-faint); margin-bottom:6px; font-size:28px; }
.empty-state h2 { font-size:18px; color:var(--text); }
.empty-state p { font-size:13.5px; max-width:360px; line-height:1.5; }

.playlist-hero { display:flex; align-items:flex-end; gap:20px; padding:24px 28px 26px; margin:-12px -28px 20px; }
.hero-art { width:120px; height:120px; border-radius:10px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; color:var(--text-faint); flex-shrink:0; box-shadow:0 10px 30px rgba(0,0,0,.4); font-size:42px; }
.liked-art { background:linear-gradient(135deg,#6F8CFF,#C77DFF); color:#fff; }
.hero-info { display:flex; flex-direction:column; gap:6px; }
.hero-kicker { font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim); }
.hero-title { font-size:34px; font-weight:800; letter-spacing:-0.02em; }
.hero-meta { font-size:13px; color:var(--text-dim); }

.player-left { display:flex; align-items:center; gap:12px; min-width:0; }
.player-art { width:50px; height:50px; border-radius:7px; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.85); flex-shrink:0; font-size:18px; }
.player-meta { display:flex; flex-direction:column; min-width:0; overflow:hidden; }
.player-meta.idle .player-title { color:var(--text-dim); }
.player-title { font-size:13.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.play-btn { width:34px; height:34px; border-radius:50%; background:var(--text); color:#0b0b0e; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px; font-family:inherit; }

.menu-wrap { position:relative; }
.dropdown { position:absolute; right:0; top:32px; background:var(--surface-2); border:1px solid var(--border); border-radius:8px; min-width:190px; padding:6px; z-index:30; box-shadow:0 12px 28px rgba(0,0,0,.5); }
.dropdown-label { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text-faint); padding:6px 8px 4px; }
.dropdown-item { display:flex; align-items:center; gap:8px; width:100%; text-align:left; background:transparent; border:none; color:var(--text); font-size:13px; padding:7px 8px; border-radius:5px; cursor:pointer; font-family:inherit; }
.dropdown-item:hover { background:var(--surface-hover); }
.dropdown-item.danger { color:var(--danger); }
.dropdown-empty { font-size:12px; color:var(--text-faint); padding:6px 8px; }
.dropdown-divider { height:1px; background:var(--border); margin:5px 2px; }
.transition-dropdown { width:230px; }
.dropdown-foot-note { font-size:11px; line-height:1.45; color:var(--text-faint); padding:8px 8px 4px; border-top:1px solid var(--border); margin-top:4px; }

.modal-veil { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(2px); }
.modal-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:420px; max-width:90vw; padding:20px; box-shadow:0 24px 60px rgba(0,0,0,.55); }
.modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.modal-head h3 { font-size:16px; font-weight:700; }

.upload-zone:hover, .upload-zone.drag { border-color:var(--accent); background:var(--accent-soft); color:var(--text); }
.upload-main { font-size:13.5px; font-weight:600; }
.upload-sub { font-size:12px; color:var(--text-faint); }
.modal-foot { font-size:11.5px; color:var(--text-faint); margin-top:14px; line-height:1.5; }
.upload-progress-list { display:flex; flex-direction:column; gap:8px; margin-top:14px; max-height:160px; overflow-y:auto; }
.upload-progress-item { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-dim); }

.drop-veil { position:fixed; inset:0; background:rgba(8,8,10,.82); z-index:300; display:flex; align-items:center; justify-content:center; }
.drop-card { display:flex; flex-direction:column; align-items:center; gap:10px; color:var(--text); border:2px dashed var(--accent); border-radius:16px; padding:40px 60px; }

.toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--surface-2); border:1px solid var(--border); color:var(--text); font-size:13px; font-weight:600; padding:10px 18px; border-radius:10px; z-index:400; box-shadow:0 10px 24px rgba(0,0,0,.4); display:flex; align-items:center; gap:8px; max-width:80vw; text-align:center; }
.toast.error { border-color:var(--danger); color:var(--danger); }

@keyframes spin { to { transform:rotate(360deg); } }

::-webkit-scrollbar { width:8px; }
::-webkit-scrollbar-thumb { background:var(--surface-2); border-radius:4px; }

@media (max-width: 760px) {

<script>
/* =========================================================================
   LUMEN — Supabase edition
   Real accounts (Supabase Auth), shared song library (Postgres + Storage),
   per-user playlists/liked songs, device recognition for auto-sign-in,
   and a fixed player that stops cleanly if a song's file disappears.
   ========================================================================= */

const SUPABASE_URL = "https://jlcqvuagjeedrghmeety.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsY3F2dWFnamVlZHJnaG1lZXR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMDUwNzIsImV4cCI6MjA5NzU4MTA3Mn0.DhSeOkLgCVvL_xZ3MD1LMEasjU5VwdBslA_Mtbm-5NQ";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ---------- helpers ----------
function uid() { return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now().toString(36); }
function formatTime(sec) {
  if (!sec || isNaN(sec)) return "0:00";
  const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, "0")}`;
}
const ACCENTS = ["#3DDC97","#FF6B6B","#FFD166","#6F8CFF","#C77DFF","#FF8FAB"];
function colorFor(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
  return ACCENTS[h % ACCENTS.length];
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

// ---------- device recognition ----------
// A random token stored in localStorage identifies *this browser*. We register
// it against the signed-in user's account in known_devices, so next time this
// exact browser opens the app, we can silently restore their session.
const DEVICE_TOKEN_KEY = "lumen-device-token";
function getOrCreateDeviceToken() {
  let token = localStorage.getItem(DEVICE_TOKEN_KEY);
  if (!token) {
    token = uid();
    localStorage.setItem(DEVICE_TOKEN_KEY, token);
  }
  return token;
}
function guessDeviceLabel() {
  const ua = navigator.userAgent;
  let os = "Unknown device";
  if (/iPhone/.test(ua)) os = "iPhone";
  else if (/iPad/.test(ua)) os = "iPad";
  else if (/Android/.test(ua)) os = "Android device";
  else if (/Mac/.test(ua)) os = "Mac";
  else if (/Windows/.test(ua)) os = "Windows PC";
  else if (/Linux/.test(ua)) os = "Linux device";
  let browser = "";
  if (/Edg\//.test(ua)) browser = "Edge";
  else if (/Chrome\//.test(ua)) browser = "Chrome";
  else if (/Firefox\//.test(ua)) browser = "Firefox";
  else if (/Safari\//.test(ua)) browser = "Safari";
  return browser ? `${os} · ${browser}` : os;
}

// ---------- app state ----------
const state = {
  authChecked: false,
  session: null,        // supabase auth session
  profile: null,        // { id, username, is_owner }
  songs: [],             // { id, title, artist, album, duration, color, added_at, storage_path, publicUrl }
  playlists: [],          // { id, name, is_liked, songIds: [] }
  view: { screen: "home", playlistId: null },
  queue: [],
  queueIndex: 0,
  isPlaying: false,
  progress: 0,
  duration: 0,
  volume: 0.8,
  muted: false,
  shuffle: false,
  repeat: false,
  searchTerm: "",
  transitionMode: "short",
  showUploadModal: false,
  showTransitionMenu: false,
  showSongMenuFor: null,
  toast: null,
  toastIsError: false,
  loginMode: "signin", // signin | signup
  uploadProgress: [],   // [{name, status}]
  rememberedDeviceLabel: null,
};

const FADE_MS = { off: 0, short: 4000, long: 9000, gapless: 0 };
const TRANSITION_LABELS = { off: "No transition", short: "Crossfade (4s)", long: "Crossfade (9s)", gapless: "Gapless" };

// ---------- audio engine: two <audio> elements for crossfade ----------
const deckA = new Audio();
const deckB = new Audio();
[deckA, deckB].forEach(d => { d.preload = "auto"; });
let activeDeck = deckA, standbyDeck = deckB;
let transitioning = false;
let preparedSongId = null;

function currentSong() {
  return state.queue.length ? state.songs.find(s => s.id === state.queue[state.queueIndex]) : null;
}

function applyVolume() {
  activeDeck.volume = state.muted ? 0 : state.volume;
}

// Stop everything immediately and clear queue state — used when the file
// that's supposed to be playing turns out not to exist (deleted, broken URL).
function hardStopBrokenPlayback(reason) {
  [deckA, deckB].forEach(d => { try { d.pause(); } catch (e) {} d.removeAttribute("src"); d.load(); });
  transitioning = false;
  preparedSongId = null;
  state.isPlaying = false;
  state.progress = 0;
  state.duration = 0;
  showToast(reason || "That song is no longer available", true);
  render();
}

function loadFresh(song, autoplay) {
  transitioning = false;
  preparedSongId = null;
  standbyDeck.pause();
  standbyDeck.removeAttribute("src");

  activeDeck.src = song.publicUrl;
  activeDeck.dataset.songId = song.id;
  activeDeck.currentTime = 0;
  applyVolume();

  if (autoplay) {
    const playPromise = activeDeck.play();
    if (playPromise) {
      playPromise.catch(() => {
        // Most common real-world cause: the file no longer exists at that
        // storage path (404) or the browser blocked autoplay.
        if (activeDeck.error || activeDeck.networkState === HTMLMediaElement.NETWORK_NO_SOURCE) {
          hardStopBrokenPlayback("That file seems to be missing.");
        } else {
          state.isPlaying = false;
          render();
        }
      });
    }
  }
}

// Fires whenever a deck's element hits a real load/playback error — this is
// the actual fix for "music keeps playing even when the file is gone":
// we listen for the browser telling us the source is broken, and react
// immediately instead of letting a dead <audio> element spin silently.
[deckA, deckB].forEach(deck => {
  deck.addEventListener("error", () => {
    if (deck !== activeDeck) return; // standby deck failing to preload isn't fatal
    hardStopBrokenPlayback("That file seems to be missing or unreadable.");
  });
  deck.addEventListener("stalled", () => {
    if (deck !== activeDeck) return;
    // give it a moment — true network hiccups recover, dead links don't
    setTimeout(() => {
      if (deck === activeDeck && deck.error) hardStopBrokenPlayback("Playback stalled — the file may be missing.");
    }, 4000);
  });
});

function prepareNext() {
  const next = peekNextSong();
  if (!next) { preparedSongId = null; return; }
  if (preparedSongId === next.id) return;
  standbyDeck.src = next.publicUrl;
  standbyDeck.dataset.songId = next.id;
  standbyDeck.currentTime = 0;
  standbyDeck.load();
  preparedSongId = next.id;
}

function peekNextSong() {
  if (!state.queue.length) return null;
  let idx;
  if (state.shuffle) idx = (state.queueIndex + 1) % state.queue.length;
  else {
    idx = state.queueIndex + 1;
    if (idx >= state.queue.length) idx = state.repeat ? 0 : -1;
  }
  if (idx < 0) return null;
  return state.songs.find(s => s.id === state.queue[idx]) || null;
}

function beginTransition() {
  if (transitioning || !preparedSongId) return false;
  const fadeMs = FADE_MS[state.transitionMode];
  transitioning = true;
  const outDeck = activeDeck, inDeck = standbyDeck;

  inDeck.volume = fadeMs > 0 ? 0 : (state.muted ? 0 : state.volume);
  inDeck.currentTime = 0;
  inDeck.play().catch(() => {});

  if (fadeMs > 0) {
    const steps = 20;
    const stepTime = fadeMs / steps;
    let i = 0;
    const targetVol = state.muted ? 0 : state.volume;
    const fadeTimer = setInterval(() => {
      i++;
      const t = i / steps;
      outDeck.volume = Math.max(0, targetVol * (1 - t));
      inDeck.volume = Math.min(targetVol, targetVol * t);
      if (i >= steps) {
        clearInterval(fadeTimer);
        outDeck.pause();
        outDeck.currentTime = 0;
        finishTransition(outDeck, inDeck);
      }
    }, stepTime);
  } else {
    outDeck.pause();
    outDeck.currentTime = 0;
    finishTransition(outDeck, inDeck);
  }
  return true;
}

function finishTransition(outDeck, inDeck) {
  activeDeck = inDeck;
  standbyDeck = outDeck;
  transitioning = false;
  preparedSongId = null;
  const songId = activeDeck.dataset.songId;
  const idx = state.queue.indexOf(songId);
  if (idx >= 0) state.queueIndex = idx;
  prepareNext();
  render();
}

let rafId = requestAnimationFrame(tick);
function tick() {
  const dur = activeDeck.duration;
  const cur = activeDeck.currentTime;
  if (dur && !isNaN(dur)) {
    state.progress = cur;
    state.duration = dur;
    const remaining = dur - cur;
    const fadeMs = FADE_MS[state.transitionMode];
    const window_ = fadeMs > 0 ? fadeMs / 1000 + 0.4 : 0.25;
    if (!transitioning && remaining <= window_ && remaining > 0 && preparedSongId) {
      beginTransition();
    }
    updateProgressUI();
  }
  rafId = requestAnimationFrame(tick);
}

function updateProgressUI() {
  const fill = document.querySelector(".seek-fill");
  const thumb = document.querySelector(".seek-thumb");
  const timeEls = document.querySelectorAll(".player-bar .time");
  if (fill && state.duration) {
    const pct = (state.progress / state.duration) * 100;
    fill.style.width = pct + "%";
    if (thumb) thumb.style.left = pct + "%";
    if (timeEls[0]) timeEls[0].textContent = formatTime(state.progress);
    if (timeEls[1]) timeEls[1].textContent = formatTime(state.duration);
  }
}

activeDeck.addEventListener("ended", () => { if (!transitioning) handleNext(true); });
deckA.addEventListener("play", () => { if (activeDeck === deckA) state.isPlaying = true; });
deckB.addEventListener("play", () => { if (activeDeck === deckB) state.isPlaying = true; });

// ---------- playback controls ----------
function playSongList(list, startId) {
  state.queue = list.map(s => s.id);
  state.queueIndex = Math.max(0, state.queue.indexOf(startId));
  const song = currentSong();
  if (song) { loadFresh(song, true); state.isPlaying = true; prepareNext(); }
  render();
}

function togglePlay() {
  const song = currentSong();
  if (!song) { if (state.songs.length) playSongList(state.songs, state.songs[0].id); return; }
  if (state.isPlaying) { activeDeck.pause(); state.isPlaying = false; }
  else { activeDeck.play().catch(() => {}); state.isPlaying = true; }
  render();
}

function handleNext(auto) {
  if (!state.queue.length) return;
  if (state.repeat && auto && state.queue.length === 1) { activeDeck.currentTime = 0; activeDeck.play(); return; }
  if (!auto && preparedSongId) { if (beginTransition()) return; }
  let next = state.shuffle ? Math.floor(Math.random() * state.queue.length) : state.queueIndex + 1;
  if (next >= state.queue.length) {
    if (!state.repeat) { state.isPlaying = false; render(); return; }
    next = 0;
  }
  state.queueIndex = next;
  const song = currentSong();
  if (song) { loadFresh(song, true); state.isPlaying = true; prepareNext(); }
  render();
}

function handlePrev() {
  if (activeDeck.currentTime > 3) { activeDeck.currentTime = 0; return; }
  const prev = state.queueIndex - 1 < 0 ? state.queue.length - 1 : state.queueIndex - 1;
  state.queueIndex = prev;
  const song = currentSong();
  if (song) { loadFresh(song, true); state.isPlaying = true; prepareNext(); }
  render();
}

function seekTo(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
  if (state.duration) { activeDeck.currentTime = pct * state.duration; state.progress = activeDeck.currentTime; }
}

// ---------- liked songs / playlists (Supabase-backed) ----------
function likedPlaylist() { return state.playlists.find(p => p.is_liked); }
function isLiked(songId) { return likedPlaylist()?.songIds.includes(songId) || false; }

async function toggleLiked(songId) {
  const pl = likedPlaylist();
  if (!pl) return;
  const has = pl.songIds.includes(songId);
  if (has) {
    pl.songIds = pl.songIds.filter(id => id !== songId);
    await sb.from("playlist_songs").delete().eq("playlist_id", pl.id).eq("song_id", songId);
  } else {
    pl.songIds = [songId, ...pl.songIds];
    await sb.from("playlist_songs").insert({ playlist_id: pl.id, song_id: songId });
  }
  render();
}

async function createPlaylist() {
  const { data, error } = await sb.from("playlists").insert({
    owner_id: state.profile.id, name: `Playlist ${state.playlists.length}`, is_liked: false
  }).select().single();
  if (error) { showToast("Couldn't create playlist", true); return; }
  state.playlists.push({ ...data, songIds: [] });
  state.view = { screen: "playlist", playlistId: data.id };
  render();
}

async function renamePlaylist(id, name) {
  const p = state.playlists.find(p => p.id === id);
  if (p) p.name = name;
  await sb.from("playlists").update({ name }).eq("id", id);
}

async function addToPlaylist(pid, sid) {
  const p = state.playlists.find(p => p.id === pid);
  if (p && !p.songIds.includes(sid)) {
    p.songIds.push(sid);
    await sb.from("playlist_songs").insert({ playlist_id: pid, song_id: sid });
    showToast("Added to playlist");
    render();
  }
}

function showToast(msg, isError) {
  state.toast = msg;
  state.toastIsError = !!isError;
  render();
  setTimeout(() => { state.toast = null; render(); }, 2800);
}

// ---------- file upload (owner only) ----------
async function handleFiles(fileList) {
  const files = Array.from(fileList).filter(f =>
    f.type.startsWith("audio/") || /\.(mp3|wav|ogg|m4a|aac|flac)$/i.test(f.name)
  );
  if (!files.length) { showToast("No supported audio files found", true); return; }

  state.uploadProgress = files.map(f => ({ name: f.name, status: "pending" }));
  render();

  let successCount = 0;
  for (const file of files) {
    const entry = state.uploadProgress.find(e => e.name === file.name);
    entry.status = "uploading";
    render();
    try {
      const rawName = file.name.replace(/\.[^/.]+$/, "");
      let title = rawName, artist = "Unknown artist";
      if (rawName.includes(" - ")) { const [a, b] = rawName.split(" - "); artist = a.trim(); title = b.trim(); }

      const duration = await probeDuration(file);
      const ext = file.name.split(".").pop();
      const storagePath = `${state.profile.id}/${uid()}.${ext}`;

      const { error: uploadErr } = await sb.storage.from("songs").upload(storagePath, file, {
        contentType: file.type || "audio/mpeg", upsert: false
      });
      if (uploadErr) throw uploadErr;

      const { data: row, error: insertErr } = await sb.from("songs").insert({
        title, artist, album: "Local upload", duration, color: colorFor(rawName + uid()),
        storage_path: storagePath, uploaded_by: state.profile.id
      }).select().single();
      if (insertErr) throw insertErr;

      const { data: urlData } = sb.storage.from("songs").getPublicUrl(storagePath);
      state.songs.unshift({ ...row, publicUrl: urlData.publicUrl });

      entry.status = "done";
      successCount++;
    } catch (e) {
      console.error("Upload error", file.name, e);
      entry.status = "error";
    }
    render();
  }

  setTimeout(() => { state.uploadProgress = []; state.showUploadModal = false; render(); }, 900);
  if (successCount) showToast(`Added ${successCount} song${successCount > 1 ? "s" : ""} — live for everyone now`);
}

function probeDuration(file) {
  return new Promise(resolve => {
    const url = URL.createObjectURL(file);
    const a = new Audio();
    a.preload = "metadata";
    a.src = url;
    a.addEventListener("loadedmetadata", () => { resolve(a.duration || 0); URL.revokeObjectURL(url); });
    a.addEventListener("error", () => { resolve(0); URL.revokeObjectURL(url); });
  });
}

async function removeSong(id) {
  const song = state.songs.find(s => s.id === id);
  if (!song) return;
  // If this is the song currently loaded, stop playback cleanly first
  if (activeDeck.dataset.songId === id) hardStopBrokenPlayback("Song removed");

  await sb.storage.from("songs").remove([song.storage_path]);
  await sb.from("songs").delete().eq("id", id);

  state.songs = state.songs.filter(s => s.id !== id);
  state.playlists.forEach(p => { p.songIds = p.songIds.filter(sid => sid !== id); });
  state.queue = state.queue.filter(sid => sid !== id);
  showToast("Removed");
  render();
}

// ---------- refresh: pulls latest shared songs (covers "owner adds a file -> updates for everyone") ----------
async function refreshSongs(silent) {
  const { data, error } = await sb.from("songs").select("*").order("added_at", { ascending: false });
  if (error) return;
  const known = new Set(state.songs.map(s => s.id));
  const incoming = data.map(row => ({
    ...row,
    publicUrl: sb.storage.from("songs").getPublicUrl(row.storage_path).data.publicUrl
  }));
  const newOnes = incoming.filter(s => !known.has(s.id));
  state.songs = incoming;
  if (!silent && newOnes.length) showToast(`${newOnes.length} new song${newOnes.length > 1 ? "s" : ""} added`);
  render();
}

// ---------- auth ----------
async function signUp(username, password) {
  username = username.trim();
  if (username.length < 3) return { error: "Username must be at least 3 characters." };
  if (password.length < 6) return { error: "Password must be at least 6 characters." };

  // Supabase Auth requires an email; we synthesize one from the username so
  // people only ever think in terms of "username + password."
  const syntheticEmail = `${username.toLowerCase().replace(/[^a-z0-9_.-]/g, "")}@lumen.local`;

  const { data, error } = await sb.auth.signUp({ email: syntheticEmail, password });
  if (error) {
    if (/already registered/i.test(error.message)) return { error: "That username is taken." };
    return { error: error.message };
  }

  const userId = data.user.id;
  const isFirstUser = await checkIfFirstUser();
  const { error: profileErr } = await sb.from("profiles").insert({
    id: userId, username, is_owner: isFirstUser
  });
  if (profileErr) return { error: "Account created but profile setup failed: " + profileErr.message };

  return { ok: true, session: data.session };
}

async function checkIfFirstUser() {
  const { count } = await sb.from("profiles").select("*", { count: "exact", head: true });
  return (count || 0) === 0;
}

async function signIn(username, password) {
  username = username.trim();
  const syntheticEmail = `${username.toLowerCase().replace(/[^a-z0-9_.-]/g, "")}@lumen.local`;
  const { data, error } = await sb.auth.signInWithPassword({ email: syntheticEmail, password });
  if (error) return { error: "Incorrect username or password." };
  return { ok: true, session: data.session };
}

async function loadProfile(userId) {
  const { data, error } = await sb.from("profiles").select("*").eq("id", userId).single();
  if (error) return null;
  return data;
}

async function loadPlaylistsWithSongs() {
  const { data: playlists, error } = await sb.from("playlists").select("*").eq("owner_id", state.profile.id);
  if (error) { state.playlists = []; return; }
  const { data: links } = await sb.from("playlist_songs").select("*");
  state.playlists = playlists.map(p => ({
    ...p,
    songIds: (links || []).filter(l => l.playlist_id === p.id).map(l => l.song_id)
  }));
}

async function registerKnownDevice() {
  const token = getOrCreateDeviceToken();
  const label = guessDeviceLabel();
  await sb.from("known_devices").upsert({
    user_id: state.profile.id, device_token: token, device_label: label, last_seen_at: new Date().toISOString()
  }, { onConflict: "device_token" });
}

async function tryDeviceAutoLogin() {
  // The Supabase JS client persists its own session in localStorage already
  // (that's the primary "stay signed in" mechanism). known_devices exists so
  // the owner/account holder can see + revoke recognized devices, and so we
  // can show a friendly "Welcome back on <device>" note.
  const token = getOrCreateDeviceToken();
  const { data } = await sb.from("known_devices").select("device_label").eq("device_token", token).maybeSingle();
  if (data) state.rememberedDeviceLabel = data.device_label;
}

function signOut() {
  sb.auth.signOut();
  state.session = null;
  state.profile = null;
  state.songs = [];
  state.playlists = [];
  state.queue = [];
  hardStopBrokenPlayback(null);
  state.toast = null;
  render();
}

// ---------- initial load ----------
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    state.session = session;
    state.profile = await loadProfile(session.user.id);
    if (state.profile) {
      await registerKnownDevice();
      await loadPlaylistsWithSongs();
      await refreshSongs(true);
    } else {
      // session exists but no profile row (shouldn't normally happen) — sign out to recover
      await sb.auth.signOut();
      state.session = null;
    }
  } else {
    await tryDeviceAutoLogin();
  }
  state.authChecked = true;
  render();

  // Refresh shared songs whenever the tab regains focus/visibility —
  // this is the "app updates when the owner adds a file" mechanism for a
  // static site with no push channel.
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && state.profile) refreshSongs(false);
  });
  window.addEventListener("focus", () => { if (state.profile) refreshSongs(false); });
}

// =========================================================================
// RENDER
// =========================================================================
function render() {
  const app = document.getElementById("app");

  if (!state.authChecked) {
    app.innerHTML = `<div class="login-screen"><div class="spin" style="font-size:24px;">◐</div></div>`;
    return;
  }

  if (!state.profile && !window.__guestMode) {
    app.innerHTML = renderLogin();
    wireLoginEvents();
    return;
  }

  app.innerHTML = renderApp();
  wireAppEvents();
}

function renderLogin() {
  const isSignup = state.loginMode === "signup";
  return `
    <div class="login-screen">
      <div class="login-card">
        <div class="login-brand"><div class="mark">L</div><div class="name">Lumen</div></div>
        ${state.rememberedDeviceLabel ? `<div class="device-banner">Recognized this device (${escapeHtml(state.rememberedDeviceLabel)}) — sign in to continue where you left off.</div>` : ""}
        <div class="tab-row">
          <button class="tab-btn ${!isSignup ? "active" : ""}" id="tab-signin">Sign in</button>
          <button class="tab-btn ${isSignup ? "active" : ""}" id="tab-signup">Create account</button>
        </div>
        <p class="login-sub">${isSignup ? "Anyone can create an account to save liked songs and playlists. Only the owner can add or remove songs." : "Sign in to your account."}</p>
        <input type="text" id="auth-user" class="login-input" placeholder="Username" autofocus autocomplete="username">
        <input type="password" id="auth-pass" class="login-input" placeholder="Password" autocomplete="${isSignup ? "new-password" : "current-password"}">
        ${isSignup ? `<input type="password" id="auth-pass-confirm" class="login-input" placeholder="Confirm password" autocomplete="new-password">` : ""}
        <div class="login-error" id="login-error"></div>
        <button class="login-btn" id="auth-submit">${isSignup ? "Create account" : "Sign in"}</button>
        <div class="guest-link" id="guest-link">Continue as guest (listen only)</div>
        <p class="login-note">${isSignup ? "The very first account created automatically becomes the owner." : ""}</p>
      </div>
    </div>`;
}

function wireLoginEvents() {
  const guestLink = document.getElementById("guest-link");
  if (guestLink) guestLink.onclick = () => { window.__guestMode = true; render(); };

  const tabSignin = document.getElementById("tab-signin");
  const tabSignup = document.getElementById("tab-signup");
  if (tabSignin) tabSignin.onclick = () => { state.loginMode = "signin"; render(); };
  if (tabSignup) tabSignup.onclick = () => { state.loginMode = "signup"; render(); };

  const submitBtn = document.getElementById("auth-submit");
  if (submitBtn) {
    const doSubmit = async () => {
      const username = document.getElementById("auth-user").value;
      const password = document.getElementById("auth-pass").value;
      const err = document.getElementById("login-error");
      err.textContent = "";
      submitBtn.disabled = true;
      submitBtn.textContent = "Please wait…";

      let result;
      if (state.loginMode === "signup") {
        const confirm = document.getElementById("auth-pass-confirm").value;
        if (password !== confirm) {
          err.textContent = "Passwords don't match.";
          submitBtn.disabled = false; submitBtn.textContent = "Create account";
          return;
        }
        result = await signUp(username, password);
      } else {
        result = await signIn(username, password);
      }

      if (result.error) {
        err.textContent = result.error;
        submitBtn.disabled = false;
        submitBtn.textContent = state.loginMode === "signup" ? "Create account" : "Sign in";
        return;
      }

      state.session = result.session;
      state.profile = await loadProfile(result.session.user.id);
      await registerKnownDevice();
      await loadPlaylistsWithSongs();
      await refreshSongs(true);
      render();
    };
    submitBtn.onclick = doSubmit;
    document.getElementById("auth-pass").addEventListener("keydown", e => { if (e.key === "Enter") doSubmit(); });
  }
}

function renderApp() {
  const song = currentSong();
  const filtered = state.searchTerm
    ? state.songs.filter(s => s.title.toLowerCase().includes(state.searchTerm.toLowerCase()) || s.artist.toLowerCase().includes(state.searchTerm.toLowerCase()))
    : state.songs;
  const isOwner = state.profile?.is_owner;
  const isGuest = !state.profile;

  return `
    ${state.toast ? `<div class="toast ${state.toastIsError ? "error" : ""}">${escapeHtml(state.toast)}</div>` : ""}
    <div class="shell">
      ${renderSidebar(isOwner, isGuest)}
      <main class="main-panel">
        <div class="top-bar">
          <div class="search-wrap">
            <span>⌕</span>
            <input id="search-input" placeholder="Search songs or artists" value="${escapeHtml(state.searchTerm)}">
          </div>
          <div class="account-row">
            ${isGuest ? `<span class="user-badge">Guest</span><span class="signout-btn" id="signout-btn">Sign in</span>`
              : `${isOwner ? `<span class="owner-badge">★ Owner</span>` : `<span class="user-badge">${escapeHtml(state.profile.username)}</span>`}<span class="signout-btn" id="signout-btn">Sign out</span>`}
          </div>
        </div>
        <div class="scroll-area">${renderMainContent(filtered, isOwner)}</div>
      </main>
    </div>
    ${renderPlayerBar(song)}
    ${state.showUploadModal ? renderUploadModal() : ""}
  `;
}

function renderSidebar(isOwner, isGuest) {
  const liked = likedPlaylist();
  return `
    <aside class="sidebar">
      <div class="brand"><div class="brand-mark">L</div><span class="brand-name">Lumen</span></div>
      <nav class="nav-block">
        <button class="nav-item ${state.view.screen === "home" ? "active" : ""}" data-action="go-home">⌂ Home</button>
        ${isOwner ? `<button class="nav-item" data-action="open-upload">+ Add songs</button>` : ""}
      </nav>
      <div class="library-block">
        <div class="library-head"><span>Your library</span>
          ${!isGuest ? `<button class="icon-btn small" data-action="create-playlist" title="New playlist">+</button>` : ""}
        </div>
        <div class="playlist-list">
          ${!isGuest ? `
            <button class="playlist-row ${state.view.playlistId === liked?.id ? "active" : ""}" data-action="open-playlist" data-id="${liked?.id || ""}">
              <span class="liked-icon">♥</span><span>Liked Songs</span>
            </button>
            ${state.playlists.filter(p => !p.is_liked).map(p => `
              <button class="playlist-row ${state.view.playlistId === p.id ? "active" : ""}" data-action="open-playlist" data-id="${p.id}">
                <span class="pl-icon">≡</span><span>${escapeHtml(p.name)}</span>
              </button>`).join("")}
          ` : `<p style="font-size:12px;color:var(--text-faint);padding:8px 10px;">Sign in to save playlists.</p>`}
        </div>
      </div>
      <div class="sidebar-foot">
        ${state.songs.length === 0 ? "<p>Library is empty.</p>" : `<p>${state.songs.length} song${state.songs.length === 1 ? "" : "s"} in shared library</p>`}
      </div>
    </aside>`;
}

function renderMainContent(filtered, isOwner) {
  if (state.view.screen === "playlist") return renderPlaylistView(isOwner);
  return renderHomeView(filtered, isOwner);
}

function renderHomeView(songs, isOwner) {
  if (!songs.length) {
    return `
      <div class="empty-state">
        <div class="empty-art">♪</div>
        <h2>${state.searchTerm ? "No matches" : "Library is empty"}</h2>
        <p>${state.searchTerm ? "Try a different term." : (isOwner ? "Add a few tracks to share with everyone." : "The owner hasn't added any songs yet.")}</p>
        ${!state.searchTerm && isOwner ? `<button class="primary-btn" data-action="open-upload">Add songs</button>` : ""}
      </div>`;
  }
  const recent = songs.slice(0, 6);
  return `
    <section class="section">
      <h2 class="section-title">Recently added</h2>
      <div class="card-grid">${recent.map(renderSongCard).join("")}</div>
    </section>
    <section class="section">
      <h2 class="section-title">All songs</h2>
      ${renderSongTable(songs, isOwner)}
    </section>`;
}

function renderPlaylistView(isOwner) {
  const playlist = state.playlists.find(p => p.id === state.view.playlistId);
  if (!playlist) return `<div class="empty-state"><p>Playlist not found.</p></div>`;
  const list = playlist.songIds.map(id => state.songs.find(s => s.id === id)).filter(Boolean);
  const isLikedPl = playlist.is_liked;
  const accent = list[0]?.color || "#3DDC97";
  return `
    <div class="playlist-hero" style="background:linear-gradient(160deg,${accent}33,transparent 70%)">
      <div class="hero-art ${isLikedPl ? "liked-art" : ""}">${isLikedPl ? "♥" : "≡"}</div>
      <div class="hero-info">
        <span class="hero-kicker">Playlist</span>
        <h1 class="hero-title" ${!isLikedPl ? `data-action="rename-playlist" data-id="${playlist.id}" style="cursor:pointer"` : ""}>${escapeHtml(playlist.name)}</h1>
        <span class="hero-meta">${list.length} song${list.length === 1 ? "" : "s"}</span>
      </div>
    </div>
    ${list.length === 0
      ? `<div class="empty-state"><p>${isLikedPl ? "Songs you like appear here." : "This playlist is empty."}</p></div>`
      : renderSongTable(list, isOwner, playlist.id)
    }`;
}

function renderSongCard(song) {
  const active = currentSong()?.id === song.id;
  return `
    <button class="song-card" data-action="play-song" data-id="${song.id}">
      <div class="card-art" style="background:linear-gradient(135deg,${song.color},#14141a)">
        ♪<div class="card-play">${active && state.isPlaying ? "❙❙" : "▶"}</div>
      </div>
      <div class="card-title">${escapeHtml(song.title)}</div>
      <div class="card-artist">${escapeHtml(song.artist)}</div>
    </button>`;
}

function renderSongTable(songs, isOwner, playlistContext) {
  return `
    <div class="song-table">
      <div class="table-head"><span>#</span><span>Title</span><span>Album</span><span>Time</span><span></span></div>
      ${songs.map((song, i) => renderSongRow(song, i, isOwner, playlistContext)).join("")}
    </div>`;
}

function renderSongRow(song, i, isOwner, playlistContext) {
  const active = currentSong()?.id === song.id;
  const liked = isLiked(song.id);
  const menuOpen = state.showSongMenuFor === song.id;
  const isGuest = !state.profile;
  return `
    <div class="table-row ${active ? "active" : ""}">
      <span class="col-idx">
        <span class="idx-num">${i + 1}</span>
        <button class="idx-play" data-action="play-song" data-id="${song.id}">${active && state.isPlaying ? "❙❙" : "▶"}</button>
      </span>
      <span class="col-title" data-action="play-song" data-id="${song.id}">
        <span class="mini-art" style="background:${song.color}">♪</span>
        <span class="title-text">
          <span class="song-name ${active ? "accent" : ""}">${escapeHtml(song.title)}</span>
          <span class="song-artist">${escapeHtml(song.artist)}</span>
        </span>
      </span>
      <span class="col-album">${escapeHtml(song.album)}</span>
      <span class="col-dur">${formatTime(song.duration)}</span>
      <span class="col-actions">
        ${!isGuest ? `<button class="icon-btn small heart-btn ${liked ? "liked" : ""}" data-action="toggle-liked" data-id="${song.id}">${liked ? "♥" : "♡"}</button>` : ""}
        <div class="menu-wrap">
          <button class="icon-btn small" data-action="toggle-song-menu" data-id="${song.id}">⋯</button>
          ${menuOpen ? `
            <div class="dropdown">
              ${!isGuest ? `
                <div class="dropdown-label">Add to playlist</div>
                ${state.playlists.filter(p => !p.is_liked).map(p => `<button class="dropdown-item" data-action="add-to-playlist" data-pid="${p.id}" data-sid="${song.id}">${escapeHtml(p.name)}</button>`).join("") || `<div class="dropdown-empty">No playlists yet</div>`}
              ` : `<div class="dropdown-empty">Sign in to use playlists</div>`}
              ${isOwner ? `<div class="dropdown-divider"></div>
                <button class="dropdown-item danger" data-action="${playlistContext ? 'remove-from-playlist' : 'delete-song'}" data-id="${song.id}" data-pid="${playlistContext || ''}">
                  ${playlistContext ? "Remove from playlist" : "Delete from Lumen"}
                </button>` : ""}
            </div>` : ""}
        </div>
      </span>
    </div>`;
}

function renderPlayerBar(song) {
  const pct = state.duration ? (state.progress / state.duration) * 100 : 0;
  const isGuest = !state.profile;
  return `
    <footer class="player-bar">
      <div class="player-left">
        ${song ? `
          <div class="player-art" style="background:linear-gradient(135deg,${song.color},#14141a)">♪</div>
          <div class="player-meta">
            <span class="player-title">${escapeHtml(song.title)}</span>
            <span class="player-artist">${escapeHtml(song.artist)}</span>
          </div>
          ${!isGuest ? `<button class="icon-btn small heart-btn ${isLiked(song.id) ? "liked" : ""}" data-action="toggle-liked" data-id="${song.id}">${isLiked(song.id) ? "♥" : "♡"}</button>` : ""}
        ` : `<div class="player-meta idle"><span class="player-title">Nothing playing</span><span class="player-artist">Pick a song to start</span></div>`}
      </div>
      <div class="player-center">
        <div class="transport">
          <button class="icon-btn ${state.shuffle ? "toggled" : ""}" data-action="toggle-shuffle">⤨</button>
          <button class="icon-btn" data-action="prev" ${!state.queue.length ? "disabled" : ""}>⏮</button>
          <button class="play-btn" data-action="toggle-play" ${!song ? "disabled" : ""}>${state.isPlaying ? "❙❙" : "▶"}</button>
          <button class="icon-btn" data-action="next" ${!state.queue.length ? "disabled" : ""}>⏭</button>
          <button class="icon-btn ${state.repeat ? "toggled" : ""}" data-action="toggle-repeat">⟲</button>
        </div>
        <div class="seek-row">
          <span class="time">${formatTime(state.progress)}</span>
          <div class="seek-track" data-action="seek"><div class="seek-fill" style="width:${pct}%"></div><div class="seek-thumb" style="left:${pct}%"></div></div>
          <span class="time">${formatTime(state.duration)}</span>
        </div>
      </div>
      <div class="player-right">
        <div class="menu-wrap">
          <button class="icon-btn small ${state.transitionMode !== "off" ? "toggled" : ""}" data-action="toggle-transition-menu" title="Track transition">∿</button>
          ${state.showTransitionMenu ? `
            <div class="dropdown transition-dropdown">
              <div class="dropdown-label">Track transitions</div>
              ${Object.entries(TRANSITION_LABELS).map(([key, label]) => `
                <button class="dropdown-item" data-action="set-transition" data-mode="${key}">
                  <span style="width:14px;display:inline-block;color:var(--accent)">${state.transitionMode === key ? "✓" : ""}</span>${label}
                </button>`).join("")}
              <div class="dropdown-foot-note">Crossfade overlaps tracks. Gapless switches instantly with no silence.</div>
            </div>` : ""}
        </div>
        <button class="icon-btn" data-action="toggle-mute">${state.muted || state.volume === 0 ? "🔇" : "🔊"}</button>
        <div class="vol-track" data-action="set-volume"><div class="vol-fill" style="width:${(state.muted ? 0 : state.volume) * 100}%"></div></div>
      </div>
    </footer>`;
}

function renderUploadModal() {
  const hasProgress = state.uploadProgress.length > 0;
  return `
    <div class="modal-veil" data-action="close-upload">
      <div class="modal-card" data-stop-propagation>
        <div class="modal-head"><h3>Add songs to Lumen</h3><button class="icon-btn small" data-action="close-upload">✕</button></div>
        ${!hasProgress ? `
          <div class="upload-zone" id="upload-zone">
            <span style="font-size:26px;">⬆</span>
            <p class="upload-main">Drop audio files here, or click to browse</p>
            <p class="upload-sub">MP3, WAV, M4A, OGG — name files "Artist - Title" for best results</p>
          </div>
          <input type="file" id="file-input" accept="audio/*,.mp3,.wav,.ogg,.m4a,.aac,.flac" multiple style="display:none">
          <p class="modal-foot">Uploaded songs are stored centrally and appear for everyone using the app — no need to re-upload per device.</p>
        ` : `
          <div class="upload-progress-list">
            ${state.uploadProgress.map(e => `
              <div class="upload-progress-item">
                <span>${e.status === "done" ? "✓" : e.status === "error" ? "✕" : e.status === "uploading" ? "⬆" : "…"}</span>
                <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(e.name)}</span>
                <span style="color:${e.status === "error" ? "var(--danger)" : "var(--text-faint)"}">${e.status}</span>
              </div>`).join("")}
          </div>
        `}
      </div>
    </div>`;
}

// =========================================================================
// EVENT WIRING
// =========================================================================
function wireAppEvents() {
  document.querySelectorAll("[data-action]").forEach(el => el.addEventListener("click", handleAction));

  const searchInput = document.getElementById("search-input");
  if (searchInput) {
    searchInput.addEventListener("input", e => {
      state.searchTerm = e.target.value;
      const cursorPos = e.target.selectionStart;
      render();
      const newInput = document.getElementById("search-input");
      if (newInput) { newInput.focus(); newInput.setSelectionRange(cursorPos, cursorPos); }
    });
  }

  const signoutBtn = document.getElementById("signout-btn");
  if (signoutBtn) signoutBtn.onclick = () => { if (!state.profile) { window.__guestMode = false; render(); } else signOut(); };

  const fileInput = document.getElementById("file-input");
  const uploadZone = document.getElementById("upload-zone");
  if (uploadZone && fileInput) {
    uploadZone.addEventListener("click", () => fileInput.click());
    uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("drag"); });
    uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag"));
    uploadZone.addEventListener("drop", e => {
      e.preventDefault(); uploadZone.classList.remove("drag");
      if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
    });
  }
  if (fileInput) fileInput.addEventListener("change", e => { if (e.target.files.length) handleFiles(e.target.files); });

  if (state.profile?.is_owner) {
    document.body.ondragover = e => e.preventDefault();
    document.body.ondrop = e => { e.preventDefault(); if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); };
  } else {
    document.body.ondragover = null;
    document.body.ondrop = null;
  }
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;
  const id = el.dataset.id;
  if (el.dataset.stopPropagation !== undefined) e.stopPropagation();

  switch (action) {
    case "go-home": state.view = { screen: "home", playlistId: null }; render(); break;
    case "open-upload": if (state.profile?.is_owner) { state.showUploadModal = true; render(); } break;
    case "close-upload": state.showUploadModal = false; state.uploadProgress = []; render(); break;
    case "create-playlist": if (state.profile) createPlaylist(); break;
    case "open-playlist": state.view = { screen: "playlist", playlistId: id }; render(); break;
    case "rename-playlist": {
      const p = state.playlists.find(p => p.id === id);
      const name = prompt("Rename playlist", p?.name || "");
      if (name && name.trim()) renamePlaylist(id, name.trim());
      render();
      break;
    }
    case "play-song": {
      const list = state.view.screen === "playlist"
        ? state.playlists.find(p => p.id === state.view.playlistId).songIds.map(sid => state.songs.find(s => s.id === sid)).filter(Boolean)
        : (state.searchTerm ? state.songs.filter(s => s.title.toLowerCase().includes(state.searchTerm.toLowerCase()) || s.artist.toLowerCase().includes(state.searchTerm.toLowerCase())) : state.songs);
      playSongList(list, id);
      break;
    }
    case "toggle-play": togglePlay(); break;
    case "next": handleNext(false); break;
    case "prev": handlePrev(); break;
    case "seek": seekTo(e); break;
    case "toggle-shuffle": state.shuffle = !state.shuffle; prepareNext(); render(); break;
    case "toggle-repeat": state.repeat = !state.repeat; prepareNext(); render(); break;
    case "toggle-mute": state.muted = !state.muted; applyVolume(); render(); break;
    case "set-volume": {
      const rect = el.getBoundingClientRect();
      state.volume = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
      state.muted = false;
      applyVolume();
      render();
      break;
    }
    case "toggle-liked": if (state.profile) toggleLiked(id); break;
    case "toggle-song-menu": state.showSongMenuFor = state.showSongMenuFor === id ? null : id; render(); break;
    case "add-to-playlist": addToPlaylist(el.dataset.pid, el.dataset.sid); state.showSongMenuFor = null; break;
    case "delete-song": if (state.profile?.is_owner) { state.showSongMenuFor = null; removeSong(id); } break;
    case "remove-from-playlist": {
      const pid = el.dataset.pid;
      const p = state.playlists.find(p => p.id === pid);
      if (p) {
        p.songIds = p.songIds.filter(sid => sid !== id);
        sb.from("playlist_songs").delete().eq("playlist_id", pid).eq("song_id", id);
      }
      state.showSongMenuFor = null;
      render();
      break;
    }
    case "toggle-transition-menu": state.showTransitionMenu = !state.showTransitionMenu; render(); break;
    case "set-transition": state.transitionMode = el.dataset.mode; state.showTransitionMenu = false; render(); break;
  }
}

document.addEventListener("click", e => {
  if (!e.target.closest(".menu-wrap")) {
    if (state.showSongMenuFor || state.showTransitionMenu) {
      state.showSongMenuFor = null;
      state.showTransitionMenu = false;
      render();
    }
  }
});

init();
</script>
</body>
</html>
