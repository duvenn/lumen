<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lumen</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%233DDC97%22/></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg:#0b0b0e; --surface:#131318; --surface-2:#1a1a22; --surface-hover:#20202a;
  --border:#232330; --text:#f4f4f6; --text-dim:#9d9dac; --text-faint:#6a6a78;
  --accent:#3DDC97; --accent-soft:rgba(61,220,151,0.16); --danger:#ff6b6b;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Inter','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
}
#app { width:100%; height:100vh; display:flex; flex-direction:column; position:relative; }

.login-screen {
  position:fixed; inset:0; z-index:500;
  background:radial-gradient(circle at 30% 20%, #16241c 0%, #0b0b0e 60%);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:18px; padding:24px;
  overflow-y:auto;
}
.login-card { width:100%; max-width:360px; display:flex; flex-direction:column; gap:14px; }
.login-brand { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:2px; }
.login-brand .mark { width:38px; height:38px; border-radius:11px; background:linear-gradient(135deg,var(--accent),#1f6e4f); display:flex; align-items:center; justify-content:center; color:#06140d; font-weight:800; font-size:18px; }
.login-brand .name { font-size:26px; font-weight:800; letter-spacing:-0.02em; }
.login-sub { text-align:center; color:var(--text-dim); font-size:13.5px; line-height:1.5; margin-bottom:4px; }
.login-input {
  width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:10px;
  padding:13px 14px; color:var(--text); font-size:14px; outline:none; transition:border-color .15s; font-family:inherit;
}
.login-input:focus { border-color:var(--accent); }
.login-btn {
  background:var(--accent); color:#06140d; border:none; border-radius:10px; padding:13px;
  font-size:14px; font-weight:700; cursor:pointer; transition:filter .15s;
}
.login-btn:hover { filter:brightness(1.08); }
.login-btn:disabled { opacity:.6; cursor:default; }
.login-error { color:var(--danger); font-size:12.5px; text-align:center; min-height:16px; }
.login-note { color:var(--text-faint); font-size:11.5px; text-align:center; line-height:1.5; }
.tab-row { display:flex; gap:4px; background:var(--surface-2); border-radius:10px; padding:3px; margin-bottom:2px; }
.tab-btn { flex:1; background:transparent; border:none; color:var(--text-faint); font-size:13px; font-weight:600; padding:9px; border-radius:7px; cursor:pointer; font-family:inherit; }
.tab-btn.active { background:var(--surface-hover); color:var(--text); }
.guest-link { text-align:center; font-size:12.5px; color:var(--text-faint); margin-top:2px; cursor:pointer; }
.guest-link:hover { color:var(--text-dim); }
.device-banner { background:var(--accent-soft); border:1px solid var(--accent); color:var(--accent); font-size:12px; border-radius:8px; padding:9px 12px; text-align:center; line-height:1.4; }

.shell { flex:1; display:flex; min-height:0; overflow:hidden; }
.sidebar { width:232px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:18px 12px 14px; gap:18px; }
.brand { display:flex; align-items:center; gap:9px; padding:4px 8px 2px; }
.brand-mark { width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,var(--accent),#1f6e4f); color:#06140d; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:800; }
.brand-name { font-size:19px; font-weight:700; letter-spacing:-0.02em; }
.nav-block { display:flex; flex-direction:column; gap:2px; }
.nav-item { display:flex; align-items:center; gap:12px; padding:9px 10px; border-radius:8px; border:none; background:transparent; color:var(--text-dim); font-size:14px; font-weight:600; cursor:pointer; text-align:left; width:100%; font-family:inherit; }
.nav-item:hover { background:var(--surface-hover); color:var(--text); }
.nav-item.active { background:var(--surface-2); color:var(--text); }
.library-block { flex:1; display:flex; flex-direction:column; min-height:0; border-top:1px solid var(--border); padding-top:14px; }
.library-head { display:flex; align-items:center; gap:8px; padding:0 10px 10px; color:var(--text-dim); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; }
.library-head span:first-of-type { flex:1; }
.playlist-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:1px; }
.playlist-row { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; border:none; background:transparent; color:var(--text-dim); font-size:13.5px; font-weight:500; cursor:pointer; text-align:left; white-space:nowrap; overflow:hidden; width:100%; font-family:inherit; }
.playlist-row:hover { background:var(--surface-hover); color:var(--text); }
.playlist-row.active { background:var(--surface-2); color:var(--text); }
.liked-icon { width:22px; height:22px; border-radius:5px; background:linear-gradient(135deg,#6F8CFF,#C77DFF); color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; }
.pl-icon { width:22px; height:22px; border-radius:5px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--text-dim); font-size:11px; }
.sidebar-foot { font-size:11px; line-height:1.5; color:var(--text-faint); padding:10px 10px 0; border-top:1px solid var(--border); }
.owner-badge { display:inline-flex; align-items:center; gap:5px; background:var(--accent-soft); color:var(--accent); font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:20px; }
.user-badge { display:inline-flex; align-items:center; gap:5px; background:var(--surface-2); color:var(--text-dim); font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:20px; }
.signout-btn { font-size:11px; color:var(--text-faint); cursor:pointer; text-decoration:underline; }
.signout-btn:hover { color:var(--text-dim); }
.account-row { display:flex; align-items:center; gap:8px; }

.main-panel { flex:1; display:flex; flex-direction:column; min-width:0; min-height:0; }
.top-bar { display:flex; align-items:center; justify-content:space-between; padding:16px 28px 8px; flex-shrink:0; gap:12px; }
.search-wrap { display:flex; align-items:center; gap:8px; background:var(--surface-2); border:1px solid var(--border); border-radius:20px; padding:8px 14px; width:280px; color:var(--text-faint); }
.search-wrap input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size:13.5px; font-family:inherit; }
.scroll-area { flex:1; overflow-y:auto; padding:12px 28px 28px; }
.section { margin-bottom:30px; }
.section-title { font-size:19px; font-weight:700; letter-spacing:-0.01em; margin-bottom:14px; }
.card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; }
.song-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px; display:flex; flex-direction:column; gap:10px; cursor:pointer; text-align:left; transition:background .15s; font-family:inherit; }
.song-card:hover { background:var(--surface-2); }
.card-art { width:100%; aspect-ratio:1; border-radius:7px; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.85); position:relative; font-size:24px; }
.card-play { position:absolute; bottom:6px; right:6px; width:30px; height:30px; border-radius:50%; background:var(--accent); color:#06140d; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s; box-shadow:0 6px 16px rgba(0,0,0,.4); }
.song-card:hover .card-play { opacity:1; }
.card-title { font-size:13.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.card-artist { font-size:12px; color:var(--text-faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.song-table { display:flex; flex-direction:column; }
.table-head, .table-row { display:grid; grid-template-columns:40px 1fr 180px 70px 88px; align-items:center; gap:14px; padding:8px 10px; }
.table-head { color:var(--text-faint); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid var(--border); margin-bottom:4px; }
.table-row { border-radius:7px; }
.table-row:hover { background:var(--surface-2); }
.table-row.missing { opacity:.45; }
.col-idx { display:flex; align-items:center; justify-content:center; color:var(--text-faint); font-size:13px; }
.idx-play { display:none; background:transparent; border:none; color:var(--text); cursor:pointer; align-items:center; justify-content:center; }
.table-row:hover .idx-num { display:none; } .table-row:hover .idx-play { display:flex; }
.col-title { display:flex; align-items:center; gap:10px; overflow:hidden; cursor:pointer; }
.mini-art { width:34px; height:34px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:rgba(0,0,0,.55); flex-shrink:0; font-size:13px; }
.title-text { display:flex; flex-direction:column; overflow:hidden; min-width:0; }
.song-name { font-size:13.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.song-name.accent { color:var(--accent); }
.song-artist { font-size:12px; color:var(--text-faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.col-album { font-size:13px; color:var(--text-faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.col-dur { font-size:13px; color:var(--text-faint); text-align:right; }
.col-actions { display:flex; align-items:center; justify-content:flex-end; gap:4px; position:relative; }

.icon-btn { background:transparent; border:none; color:var(--text-dim); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s,color .15s; font-size:15px; font-family:inherit; }
.icon-btn:hover { color:var(--text); background:var(--surface-hover); }
.icon-btn:disabled { opacity:.35; cursor:default; }
.icon-btn.small { width:26px; height:26px; font-size:13px; }
.icon-btn.toggled { color:var(--accent); }
.heart-btn.liked { color:var(--accent); }
.primary-btn { display:inline-flex; align-items:center; gap:8px; background:var(--accent); color:#06140d; border:none; border-radius:22px; padding:10px 20px; font-size:13.5px; font-weight:700; cursor:pointer; font-family:inherit; }
.primary-btn:hover { filter:brightness(1.08); }

.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:80px 24px; gap:10px; color:var(--text-dim); }
.empty-art { width:64px; height:64px; border-radius:50%; background:var(--surface-2); display:flex; align-items:center; justify-content:center; color:var(--text-faint); margin-bottom:6px; font-size:28px; }
.empty-state h2 { font-size:18px; color:var(--text); }
.empty-state p { font-size:13.5px; max-width:360px; line-height:1.5; }

.playlist-hero { display:flex; align-items:flex-end; gap:20px; padding:24px 28px 26px; margin:-12px -28px 20px; }
.hero-art { width:120px; height:120px; border-radius:10px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; color:var(--text-faint); flex-shrink:0; box-shadow:0 10px 30px rgba(0,0,0,.4); font-size:42px; }
.liked-art { background:linear-gradient(135deg,#6F8CFF,#C77DFF); color:#fff; }
.hero-info { display:flex; flex-direction:column; gap:6px; }
.hero-kicker { font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim); }
.hero-title { font-size:34px; font-weight:800; letter-spacing:-0.02em; }
.hero-meta { font-size:13px; color:var(--text-dim); }

.player-bar { flex-shrink:0; height:84px; background:var(--surface); border-top:1px solid var(--border); display:grid; grid-template-columns:1fr 2fr 1fr; align-items:center; padding:0 18px; gap:16px; }
.player-left { display:flex; align-items:center; gap:12px; min-width:0; }
.player-art { width:50px; height:50px; border-radius:7px; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.85); flex-shrink:0; font-size:18px; }
.player-meta { display:flex; flex-direction:column; min-width:0; overflow:hidden; }
.player-meta.idle .player-title { color:var(--text-dim); }
.player-title { font-size:13.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.player-artist { font-size:12px; color:var(--text-faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.player-center { display:flex; flex-direction:column; align-items:center; gap:6px; max-width:560px; margin:0 auto; width:100%; }
.transport { display:flex; align-items:center; gap:6px; }
.play-btn { width:34px; height:34px; border-radius:50%; background:var(--text); color:#0b0b0e; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px; font-family:inherit; }
.play-btn:hover { transform:scale(1.06); }
.play-btn:disabled { opacity:.4; cursor:default; }
.seek-row { display:flex; align-items:center; gap:9px; width:100%; }
.time { font-size:11px; color:var(--text-faint); width:36px; text-align:center; flex-shrink:0; font-variant-numeric:tabular-nums; }
.seek-track { flex:1; height:12px; display:flex; align-items:center; cursor:pointer; position:relative; }
.seek-track::before { content:''; position:absolute; left:0; right:0; height:4px; border-radius:2px; background:var(--surface-2); }
.seek-fill { position:absolute; left:0; height:4px; border-radius:2px; background:var(--text); pointer-events:none; }
.seek-thumb { position:absolute; width:11px; height:11px; border-radius:50%; background:var(--text); transform:translateX(-50%); pointer-events:none; }
.player-right { display:flex; align-items:center; justify-content:flex-end; gap:8px; }
.vol-track { width:90px; height:12px; display:flex; align-items:center; cursor:pointer; position:relative; }
.vol-track::before { content:''; position:absolute; left:0; right:0; height:4px; border-radius:2px; background:var(--surface-2); }
.vol-fill { position:absolute; left:0; height:4px; border-radius:2px; background:var(--text); pointer-events:none; }

.menu-wrap { position:relative; }
.dropdown { position:absolute; right:0; top:32px; background:var(--surface-2); border:1px solid var(--border); border-radius:8px; min-width:190px; padding:6px; z-index:30; box-shadow:0 12px 28px rgba(0,0,0,.5); }
.dropdown-label { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text-faint); padding:6px 8px 4px; }
.dropdown-item { display:flex; align-items:center; gap:8px; width:100%; text-align:left; background:transparent; border:none; color:var(--text); font-size:13px; padding:7px 8px; border-radius:5px; cursor:pointer; font-family:inherit; }
.dropdown-item:hover { background:var(--surface-hover); }
.dropdown-item.danger { color:var(--danger); }
.dropdown-empty { font-size:12px; color:var(--text-faint); padding:6px 8px; }
.dropdown-divider { height:1px; background:var(--border); margin:5px 2px; }
.transition-dropdown { width:230px; }
.dropdown-foot-note { font-size:11px; line-height:1.45; color:var(--text-faint); padding:8px 8px 4px; border-top:1px solid var(--border); margin-top:4px; }

.modal-veil { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(2px); }
.modal-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:420px; max-width:90vw; padding:20px; box-shadow:0 24px 60px rgba(0,0,0,.55); }
.modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.modal-head h3 { font-size:16px; font-weight:700; }
.upload-zone { border:1.5px dashed var(--border); border-radius:10px; padding:34px 18px; display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center; color:var(--text-dim); cursor:pointer; transition:border-color .15s,background .15s; }
.upload-zone:hover, .upload-zone.drag { border-color:var(--accent); background:var(--accent-soft); color:var(--text); }
.upload-main { font-size:13.5px; font-weight:600; }
.upload-sub { font-size:12px; color:var(--text-faint); }
.modal-foot { font-size:11.5px; color:var(--text-faint); margin-top:14px; line-height:1.5; }
.modal-card.wide { width: 480px; }
.staged-list { display:flex; flex-direction:column; gap:14px; max-height:60vh; overflow-y:auto; }
.staged-card { background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:14px; display:flex; flex-direction:column; gap:10px; }
.staged-card-head { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.staged-filename { font-size:12px; color:var(--text-faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.staged-status { font-size:11.5px; font-weight:700; flex-shrink:0; }
.staged-status.done { color: var(--accent); }
.staged-status.error { color: var(--danger); }
.staged-status.uploading { color: var(--text-dim); }
.staged-fields { display:flex; flex-direction:column; gap:8px; }
.staged-fields .login-input { padding:9px 11px; font-size:13px; }
.staged-artist-list { position:absolute; top:100%; left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-top:4px; max-height:140px; overflow-y:auto; z-index:50; box-shadow:0 12px 28px rgba(0,0,0,.5); }
.staged-actions { display:flex; gap:8px; }

.drop-veil { position:fixed; inset:0; background:rgba(8,8,10,.82); z-index:300; display:flex; align-items:center; justify-content:center; }
.drop-card { display:flex; flex-direction:column; align-items:center; gap:10px; color:var(--text); border:2px dashed var(--accent); border-radius:16px; padding:40px 60px; }

.toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--surface-2); border:1px solid var(--border); color:var(--text); font-size:13px; font-weight:600; padding:10px 18px; border-radius:10px; z-index:400; box-shadow:0 10px 24px rgba(0,0,0,.4); display:flex; align-items:center; gap:8px; max-width:80vw; text-align:center; }
.toast.error { border-color:var(--danger); color:var(--danger); }
.spin { display:inline-block; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

::-webkit-scrollbar { width:8px; }
::-webkit-scrollbar-thumb { background:var(--surface-2); border-radius:4px; }
::-webkit-scrollbar-track { background:transparent; }

@media (max-width: 760px) {
  .sidebar { display:none; }
  .top-bar { padding:12px 16px 6px; }
  .search-wrap { width:auto; flex:1; }
  .scroll-area { padding:8px 16px 24px; }
  .card-grid { grid-template-columns:repeat(2,1fr); }
  .table-head .col-album, .table-row .col-album { display:none; }
  .table-head, .table-row { grid-template-columns:32px 1fr 60px 70px; }
  .player-bar { grid-template-columns:1fr auto; height:74px; padding:0 12px; }
  .player-center { display:none; }
  .player-right { gap:4px; }
  .vol-track { display:none; }
}

/* ---------- iPhone-specific fixes ----------
   - 100dvh instead of 100vh: avoids Safari's address-bar resize jank
   - safe-area insets: keeps content clear of the notch/home-indicator
   - 16px min font-size on inputs: stops iOS auto-zooming on focus
   - explicit tap-highlight removal + touch-action for snappier taps
*/
html, body { height: 100%; height: 100dvh; }
#app { height: 100vh; height: 100dvh; }
* { -webkit-tap-highlight-color: transparent; }
button, input { touch-action: manipulation; }

@supports (padding: max(0px)) {
  .login-screen { padding-top: max(24px, env(safe-area-inset-top)); padding-bottom: max(24px, env(safe-area-inset-bottom)); }
  .top-bar { padding-top: max(16px, env(safe-area-inset-top)); }
  .player-bar { padding-bottom: max(0px, env(safe-area-inset-bottom)); height: calc(84px + env(safe-area-inset-bottom)); }
}

@media (max-width: 760px) {
  .login-input, .search-wrap input { font-size: 16px; } /* prevents iOS zoom-on-focus */
  @supports (padding: max(0px)) {
    .player-bar { height: calc(74px + env(safe-area-inset-bottom)); }
  }
}

/* ---------- Startup / splash screen ---------- */
.splash-screen {
  position: fixed; inset: 0; z-index: 1000;
  background: radial-gradient(circle at 50% 40%, #16241c 0%, #0b0b0e 65%);
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 18px;
  animation: splash-fade-out 0.5s ease 1.9s forwards;
}
.splash-mark {
  width: 84px; height: 84px; border-radius: 24px;
  background: linear-gradient(135deg, var(--accent), #1f6e4f);
  display: flex; align-items: center; justify-content: center;
  color: #06140d; font-weight: 800; font-size: 38px;
  box-shadow: 0 20px 60px rgba(61,220,151,0.25);
  opacity: 0; transform: scale(0.7);
  animation: splash-mark-in 0.6s cubic-bezier(.2,.9,.3,1.3) 0.1s forwards;
}
.splash-name {
  font-size: 30px; font-weight: 800; letter-spacing: -0.02em;
  opacity: 0; transform: translateY(8px);
  animation: splash-text-in 0.5s ease 0.55s forwards;
}
.splash-tagline {
  font-size: 13px; color: var(--text-faint); letter-spacing: 0.04em; text-transform: uppercase;
  opacity: 0;
  animation: splash-text-in 0.5s ease 0.85s forwards;
}
@keyframes splash-mark-in { to { opacity: 1; transform: scale(1); } }
@keyframes splash-text-in { to { opacity: 1; transform: translateY(0); } }
@keyframes splash-fade-out { to { opacity: 0; visibility: hidden; pointer-events: none; } }
</style>
</head>
<body>
<div class="splash-screen" id="splash-screen">
  <div class="splash-mark">L</div>
  <div class="splash-name">Lumen</div>
  <div class="splash-tagline">Your sound, shared</div>
</div>
<div id="app"></div>

<script>
/* =========================================================================
   LUMEN — Supabase edition
   Real accounts (Supabase Auth), shared song library (Postgres + Storage),
   per-user playlists/liked songs, device recognition for auto-sign-in,
   and a fixed player that stops cleanly if a song's file disappears.
   ========================================================================= */

const SUPABASE_URL = "https://jlcqvuagjeedrghmeety.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsY3F2dWFnamVlZHJnaG1lZXR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMDUwNzIsImV4cCI6MjA5NzU4MTA3Mn0.DhSeOkLgCVvL_xZ3MD1LMEasjU5VwdBslA_Mtbm-5NQ";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ---------- helpers ----------
function uid() { return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now().toString(36); }
function formatTime(sec) {
  if (!sec || isNaN(sec)) return "0:00";
  const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, "0")}`;
}
const ACCENTS = ["#3DDC97","#FF6B6B","#FFD166","#6F8CFF","#C77DFF","#FF8FAB"];
function colorFor(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
  return ACCENTS[h % ACCENTS.length];
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

// ---------- device recognition ----------
// A random token stored in localStorage identifies *this browser*. We register
// it against the signed-in user's account in known_devices, so next time this
// exact browser opens the app, we can silently restore their session.
const DEVICE_TOKEN_KEY = "lumen-device-token";
function getOrCreateDeviceToken() {
  let token = localStorage.getItem(DEVICE_TOKEN_KEY);
  if (!token) {
    token = uid();
    localStorage.setItem(DEVICE_TOKEN_KEY, token);
  }
  return token;
}
function guessDeviceLabel() {
  const ua = navigator.userAgent;
  let os = "Unknown device";
  if (/iPhone/.test(ua)) os = "iPhone";
  else if (/iPad/.test(ua)) os = "iPad";
  else if (/Android/.test(ua)) os = "Android device";
  else if (/Mac/.test(ua)) os = "Mac";
  else if (/Windows/.test(ua)) os = "Windows PC";
  else if (/Linux/.test(ua)) os = "Linux device";
  let browser = "";
  if (/Edg\//.test(ua)) browser = "Edge";
  else if (/Chrome\//.test(ua)) browser = "Chrome";
  else if (/Firefox\//.test(ua)) browser = "Firefox";
  else if (/Safari\//.test(ua)) browser = "Safari";
  return browser ? `${os} · ${browser}` : os;
}

// ---------- app state ----------
const state = {
  authChecked: false,
  session: null,        // supabase auth session
  profile: null,        // { id, username, is_owner }
  songs: [],             // { id, title, artist, album, duration, color, added_at, storage_path, publicUrl }
  playlists: [],          // { id, name, is_liked, songIds: [] }
  view: { screen: "home", playlistId: null },
  queue: [],
  queueIndex: 0,
  isPlaying: false,
  progress: 0,
  duration: 0,
  volume: 0.8,
  muted: false,
  shuffle: false,
  repeat: false,
  searchTerm: "",
  transitionMode: "short",
  showUploadModal: false,
  showTransitionMenu: false,
  showSongMenuFor: null,
  toast: null,
  toastIsError: false,
  loginMode: "signin", // signin | signup
  stagedUploads: [], // [{localId, file, title, artistName, album, primaryArtistId, featureArtistIds, status}]
  artists: [],        // [{id, name, bio, image_color, auto_streams, manual_stream_adjustment}]
  rememberedDeviceLabel: null,
};

const FADE_MS = { off: 0, short: 4000, long: 9000, gapless: 0 };
const TRANSITION_LABELS = { off: "No transition", short: "Crossfade (4s)", long: "Crossfade (9s)", gapless: "Gapless" };

// ---------- audio engine: two <audio> elements for crossfade ----------
const deckA = new Audio();
const deckB = new Audio();
[deckA, deckB].forEach(d => { d.preload = "auto"; });
let activeDeck = deckA, standbyDeck = deckB;
let transitioning = false;
let preparedSongId = null;

function currentSong() {
  return state.queue.length ? state.songs.find(s => s.id === state.queue[state.queueIndex]) : null;
}

function applyVolume() {
  activeDeck.volume = state.muted ? 0 : state.volume;
}

// Stop everything immediately and clear queue state — used when the file
// that's supposed to be playing turns out not to exist (deleted, broken URL).
function hardStopBrokenPlayback(reason) {
  [deckA, deckB].forEach(d => { try { d.pause(); } catch (e) {} d.removeAttribute("src"); d.load(); });
  transitioning = false;
  preparedSongId = null;
  state.isPlaying = false;
  state.progress = 0;
  state.duration = 0;
  showToast(reason || "That song is no longer available", true);
  render();
}

function loadFresh(song, autoplay) {
  transitioning = false;
  preparedSongId = null;
  standbyDeck.pause();
  standbyDeck.removeAttribute("src");

  activeDeck.src = song.publicUrl;
  activeDeck.dataset.songId = song.id;
  activeDeck.currentTime = 0;
  applyVolume();

  if (autoplay) {
    const playPromise = activeDeck.play();
    if (playPromise) {
      playPromise.then(() => recordPlay(song.id)).catch(() => {
        // Most common real-world cause: the file no longer exists at that
        // storage path (404) or the browser blocked autoplay.
        if (activeDeck.error || activeDeck.networkState === HTMLMediaElement.NETWORK_NO_SOURCE) {
          hardStopBrokenPlayback("That file seems to be missing.");
        } else {
          state.isPlaying = false;
          render();
        }
      });
    }
  }
}

// Fires whenever a deck's element hits a real load/playback error — this is
// the actual fix for "music keeps playing even when the file is gone":
// we listen for the browser telling us the source is broken, and react
// immediately instead of letting a dead <audio> element spin silently.
[deckA, deckB].forEach(deck => {
  deck.addEventListener("error", () => {
    if (deck !== activeDeck) return; // standby deck failing to preload isn't fatal
    hardStopBrokenPlayback("That file seems to be missing or unreadable.");
  });
  deck.addEventListener("stalled", () => {
    if (deck !== activeDeck) return;
    // give it a moment — true network hiccups recover, dead links don't
    setTimeout(() => {
      if (deck === activeDeck && deck.error) hardStopBrokenPlayback("Playback stalled — the file may be missing.");
    }, 4000);
  });
});

function prepareNext() {
  const next = peekNextSong();
  if (!next) { preparedSongId = null; return; }
  if (preparedSongId === next.id) return;
  standbyDeck.src = next.publicUrl;
  standbyDeck.dataset.songId = next.id;
  standbyDeck.currentTime = 0;
  standbyDeck.load();
  preparedSongId = next.id;
}

function peekNextSong() {
  if (!state.queue.length) return null;
  let idx;
  if (state.shuffle) idx = (state.queueIndex + 1) % state.queue.length;
  else {
    idx = state.queueIndex + 1;
    if (idx >= state.queue.length) idx = state.repeat ? 0 : -1;
  }
  if (idx < 0) return null;
  return state.songs.find(s => s.id === state.queue[idx]) || null;
}

function beginTransition() {
  if (transitioning || !preparedSongId) return false;
  const fadeMs = FADE_MS[state.transitionMode];
  transitioning = true;
  const outDeck = activeDeck, inDeck = standbyDeck;

  inDeck.volume = fadeMs > 0 ? 0 : (state.muted ? 0 : state.volume);
  inDeck.currentTime = 0;
  inDeck.play().catch(() => {});

  if (fadeMs > 0) {
    const steps = 20;
    const stepTime = fadeMs / steps;
    let i = 0;
    const targetVol = state.muted ? 0 : state.volume;
    const fadeTimer = setInterval(() => {
      i++;
      const t = i / steps;
      outDeck.volume = Math.max(0, targetVol * (1 - t));
      inDeck.volume = Math.min(targetVol, targetVol * t);
      if (i >= steps) {
        clearInterval(fadeTimer);
        outDeck.pause();
        outDeck.currentTime = 0;
        finishTransition(outDeck, inDeck);
      }
    }, stepTime);
  } else {
    outDeck.pause();
    outDeck.currentTime = 0;
    finishTransition(outDeck, inDeck);
  }
  return true;
}

function finishTransition(outDeck, inDeck) {
  activeDeck = inDeck;
  standbyDeck = outDeck;
  transitioning = false;
  preparedSongId = null;
  const songId = activeDeck.dataset.songId;
  const idx = state.queue.indexOf(songId);
  if (idx >= 0) state.queueIndex = idx;
  prepareNext();
  render();
}

let rafId = requestAnimationFrame(tick);
function tick() {
  const dur = activeDeck.duration;
  const cur = activeDeck.currentTime;
  if (dur && !isNaN(dur)) {
    state.progress = cur;
    state.duration = dur;
    const remaining = dur - cur;
    const fadeMs = FADE_MS[state.transitionMode];
    const window_ = fadeMs > 0 ? fadeMs / 1000 + 0.4 : 0.25;
    if (!transitioning && remaining <= window_ && remaining > 0 && preparedSongId) {
      beginTransition();
    }
    updateProgressUI();
  }
  rafId = requestAnimationFrame(tick);
}

function updateProgressUI() {
  const fill = document.querySelector(".seek-fill");
  const thumb = document.querySelector(".seek-thumb");
  const timeEls = document.querySelectorAll(".player-bar .time");
  if (fill && state.duration) {
    const pct = (state.progress / state.duration) * 100;
    fill.style.width = pct + "%";
    if (thumb) thumb.style.left = pct + "%";
    if (timeEls[0]) timeEls[0].textContent = formatTime(state.progress);
    if (timeEls[1]) timeEls[1].textContent = formatTime(state.duration);
  }
}

activeDeck.addEventListener("ended", () => { if (!transitioning) handleNext(true); });
deckA.addEventListener("play", () => { if (activeDeck === deckA) state.isPlaying = true; });
deckB.addEventListener("play", () => { if (activeDeck === deckB) state.isPlaying = true; });

// ---------- playback controls ----------
function playSongList(list, startId) {
  state.queue = list.map(s => s.id);
  state.queueIndex = Math.max(0, state.queue.indexOf(startId));
  const song = currentSong();
  if (song) { loadFresh(song, true); state.isPlaying = true; prepareNext(); }
  render();
}

function togglePlay() {
  const song = currentSong();
  if (!song) { if (state.songs.length) playSongList(state.songs, state.songs[0].id); return; }
  if (state.isPlaying) { activeDeck.pause(); state.isPlaying = false; }
  else { activeDeck.play().catch(() => {}); state.isPlaying = true; }
  render();
}

function handleNext(auto) {
  if (!state.queue.length) return;
  if (state.repeat && auto && state.queue.length === 1) { activeDeck.currentTime = 0; activeDeck.play(); return; }
  if (!auto && preparedSongId) { if (beginTransition()) return; }
  let next = state.shuffle ? Math.floor(Math.random() * state.queue.length) : state.queueIndex + 1;
  if (next >= state.queue.length) {
    if (!state.repeat) { state.isPlaying = false; render(); return; }
    next = 0;
  }
  state.queueIndex = next;
  const song = currentSong();
  if (song) { loadFresh(song, true); state.isPlaying = true; prepareNext(); }
  render();
}

function handlePrev() {
  if (activeDeck.currentTime > 3) { activeDeck.currentTime = 0; return; }
  const prev = state.queueIndex - 1 < 0 ? state.queue.length - 1 : state.queueIndex - 1;
  state.queueIndex = prev;
  const song = currentSong();
  if (song) { loadFresh(song, true); state.isPlaying = true; prepareNext(); }
  render();
}

function seekTo(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
  if (state.duration) { activeDeck.currentTime = pct * state.duration; state.progress = activeDeck.currentTime; }
}

// ---------- liked songs / playlists (Supabase-backed) ----------
function likedPlaylist() { return state.playlists.find(p => p.is_liked); }
function isLiked(songId) { return likedPlaylist()?.songIds.includes(songId) || false; }

async function toggleLiked(songId) {
  const pl = likedPlaylist();
  if (!pl) return;
  const has = pl.songIds.includes(songId);
  if (has) {
    pl.songIds = pl.songIds.filter(id => id !== songId);
    await sb.from("playlist_songs").delete().eq("playlist_id", pl.id).eq("song_id", songId);
  } else {
    pl.songIds = [songId, ...pl.songIds];
    await sb.from("playlist_songs").insert({ playlist_id: pl.id, song_id: songId });
  }
  render();
}

async function createPlaylist() {
  const { data, error } = await sb.from("playlists").insert({
    owner_id: state.profile.id, name: `Playlist ${state.playlists.length}`, is_liked: false
  }).select().single();
  if (error) { showToast("Couldn't create playlist", true); return; }
  state.playlists.push({ ...data, songIds: [] });
  state.view = { screen: "playlist", playlistId: data.id };
  render();
}

async function renamePlaylist(id, name) {
  const p = state.playlists.find(p => p.id === id);
  if (p) p.name = name;
  await sb.from("playlists").update({ name }).eq("id", id);
}

async function addToPlaylist(pid, sid) {
  const p = state.playlists.find(p => p.id === pid);
  if (p && !p.songIds.includes(sid)) {
    p.songIds.push(sid);
    await sb.from("playlist_songs").insert({ playlist_id: pid, song_id: sid });
    showToast("Added to playlist");
    render();
  }
}

function showToast(msg, isError) {
  state.toast = msg;
  state.toastIsError = !!isError;
  render();
  setTimeout(() => { state.toast = null; render(); }, 2800);
}

// ---------- file upload (owner only) ----------
// ---------- staged uploads: file picked -> auto-filled metadata form -> confirm ----------
function stageFiles(fileList) {
  const files = Array.from(fileList).filter(f =>
    f.type.startsWith("audio/") || /\.(mp3|wav|ogg|m4a|aac|flac)$/i.test(f.name)
  );
  if (!files.length) { showToast("No supported audio files found", true); return; }

  state.stagedUploads = files.map(file => {
    const rawName = file.name.replace(/\.[^/.]+$/, "");
    let title = rawName, artistGuess = "";
    if (rawName.includes(" - ")) { const [a, b] = rawName.split(" - "); artistGuess = a.trim(); title = b.trim(); }
    return {
      localId: uid(), file, title, artistName: artistGuess,
      album: "", primaryArtistId: null, featureArtistIds: [],
      status: "editing" // editing | uploading | done | error
    };
  });
  render();
}

function stagedEntry(localId) { return state.stagedUploads.find(e => e.localId === localId); }

async function resolveArtistId(name) {
  name = name.trim();
  if (!name) return null;
  const existing = state.artists.find(a => a.name.toLowerCase() === name.toLowerCase());
  if (existing) return existing.id;
  const { data, error } = await sb.from("artists").insert({
    name, created_by: state.profile.id
  }).select().single();
  if (error) { console.error("artist create error", error); return null; }
  const artistRow = { ...data, image_color: colorFor(name) };
  state.artists.push(artistRow);
  return data.id;
}

async function confirmStagedUpload(localId) {
  const entry = stagedEntry(localId);
  if (!entry || entry.status === "uploading") return;
  if (!entry.title.trim()) { showToast("Title is required", true); return; }

  entry.status = "uploading";
  render();

  try {
    const duration = await probeDuration(entry.file);
    const ext = entry.file.name.split(".").pop();
    const storagePath = `${state.profile.id}/${uid()}.${ext}`;

    const { error: uploadErr } = await sb.storage.from("songs").upload(storagePath, entry.file, {
      contentType: entry.file.type || "audio/mpeg", upsert: false
    });
    if (uploadErr) throw uploadErr;

    const primaryArtistId = entry.primaryArtistId || (entry.artistName ? await resolveArtistId(entry.artistName) : null);
    const featureIds = [];
    for (const fname of entry.featureArtistIds) {
      const fid = typeof fname === "string" && fname.length === 36 ? fname : await resolveArtistId(fname);
      if (fid) featureIds.push(fid);
    }

    const { data: row, error: insertErr } = await sb.from("songs").insert({
      title: entry.title.trim(),
      artist: entry.artistName.trim() || "Unknown artist",
      album: entry.album.trim() || "Local upload",
      duration, color: colorFor(entry.title + uid()),
      storage_path: storagePath, uploaded_by: state.profile.id,
      primary_artist_id: primaryArtistId
    }).select().single();
    if (insertErr) throw insertErr;

    if (primaryArtistId) {
      await sb.from("song_artists").insert({ song_id: row.id, artist_id: primaryArtistId, role: "primary" });
    }
    for (const fid of featureIds) {
      await sb.from("song_artists").insert({ song_id: row.id, artist_id: fid, role: "feature" });
    }

    const { data: urlData } = sb.storage.from("songs").getPublicUrl(storagePath);
    state.songs.unshift({ ...row, publicUrl: urlData.publicUrl });

    entry.status = "done";
    showToast(`"${row.title}" added — live for everyone now`);
    render();
    setTimeout(() => {
      state.stagedUploads = state.stagedUploads.filter(e => e.localId !== localId);
      if (state.stagedUploads.length === 0) state.showUploadModal = false;
      render();
    }, 900);
  } catch (e) {
    console.error("Upload error", entry.file.name, e);
    entry.status = "error";
    showToast(`Couldn't add ${entry.file.name}`, true);
    render();
  }
}

function removeStagedUpload(localId) {
  state.stagedUploads = state.stagedUploads.filter(e => e.localId !== localId);
  render();
}

function probeDuration(file) {
  return new Promise(resolve => {
    const url = URL.createObjectURL(file);
    const a = new Audio();
    a.preload = "metadata";
    a.src = url;
    a.addEventListener("loadedmetadata", () => { resolve(a.duration || 0); URL.revokeObjectURL(url); });
    a.addEventListener("error", () => { resolve(0); URL.revokeObjectURL(url); });
  });
}

async function removeSong(id) {
  const song = state.songs.find(s => s.id === id);
  if (!song) return;
  // If this is the song currently loaded, stop playback cleanly first
  if (activeDeck.dataset.songId === id) hardStopBrokenPlayback("Song removed");

  await sb.storage.from("songs").remove([song.storage_path]);
  await sb.from("songs").delete().eq("id", id);

  state.songs = state.songs.filter(s => s.id !== id);
  state.playlists.forEach(p => { p.songIds = p.songIds.filter(sid => sid !== id); });
  state.queue = state.queue.filter(sid => sid !== id);
  showToast("Removed");
  render();
}

// ---------- refresh: pulls latest shared songs (covers "owner adds a file -> updates for everyone") ----------
async function refreshSongs(silent) {
  const { data, error } = await sb.from("songs").select("*").order("added_at", { ascending: false });
  if (error) return;
  const known = new Set(state.songs.map(s => s.id));
  const incoming = data.map(row => ({
    ...row,
    publicUrl: sb.storage.from("songs").getPublicUrl(row.storage_path).data.publicUrl
  }));
  const newOnes = incoming.filter(s => !known.has(s.id));
  state.songs = incoming;
  if (!silent && newOnes.length) showToast(`${newOnes.length} new song${newOnes.length > 1 ? "s" : ""} added`);
  render();
}

async function refreshArtists() {
  const { data, error } = await sb.from("artists").select("*").order("name", { ascending: true });
  if (error) return;
  state.artists = data.map(a => ({ ...a, image_color: colorFor(a.name) }));
}

function artistTotalStreams(artist) {
  return (artist.auto_streams || 0) + (artist.manual_stream_adjustment || 0);
}

async function recordPlay(songId) {
  // fire-and-forget; failures here shouldn't interrupt playback
  try {
    await sb.rpc("increment_play_count", { p_song_id: songId });
    const song = state.songs.find(s => s.id === songId);
    if (song) song.play_count = (song.play_count || 0) + 1;
    if (song?.primary_artist_id) {
      const artist = state.artists.find(a => a.id === song.primary_artist_id);
      if (artist) artist.auto_streams = (artist.auto_streams || 0) + 1;
    }
  } catch (e) { /* non-fatal */ }
}

async function createArtistManually(name) {
  name = name.trim();
  if (!name) return;
  if (state.artists.find(a => a.name.toLowerCase() === name.toLowerCase())) { showToast("Artist already exists", true); return; }
  const { data, error } = await sb.from("artists").insert({ name, created_by: state.profile.id }).select().single();
  if (error) { showToast("Couldn't create artist", true); return; }
  state.artists.push({ ...data, image_color: colorFor(name) });
  render();
}

async function setArtistStreamsExact(artistId, value) {
  const artist = state.artists.find(a => a.id === artistId);
  if (!artist) return;
  const newAdjustment = value - (artist.auto_streams || 0);
  artist.manual_stream_adjustment = newAdjustment;
  render();
  await sb.from("artists").update({ manual_stream_adjustment: newAdjustment }).eq("id", artistId);
}

async function updateArtistBio(artistId, bio) {
  const artist = state.artists.find(a => a.id === artistId);
  if (artist) artist.bio = bio;
  await sb.from("artists").update({ bio }).eq("id", artistId);
}

async function deleteArtist(artistId) {
  await sb.from("artists").delete().eq("id", artistId);
  state.artists = state.artists.filter(a => a.id !== artistId);
  render();
}

// ---------- auth ----------
// Supabase requires a syntactically valid email even though no mail is ever
// sent (confirmations are off). ".local" is not a real TLD and Supabase's
// own validator rejects it outright — ".app" passes format validation.
function usernameToEmail(username) {
  const cleaned = username.toLowerCase().replace(/[^a-z0-9_.-]/g, "");
  const safe = cleaned.length ? cleaned : "user" + Date.now().toString(36);
  return `${safe}@lumen-user.app`;
}

async function signUp(username, password) {
  username = username.trim();
  if (username.length < 3) return { error: "Username must be at least 3 characters." };
  if (password.length < 6) return { error: "Password must be at least 6 characters." };

  const syntheticEmail = usernameToEmail(username);

  const { data, error } = await sb.auth.signUp({ email: syntheticEmail, password });
  if (error) {
    if (/already registered/i.test(error.message)) return { error: "That username is taken." };
    if (/invalid/i.test(error.message)) return { error: "That username contains characters that aren't supported — try letters and numbers." };
    return { error: error.message };
  }

  const userId = data.user.id;
  const isFirstUser = await checkIfFirstUser();
  const { error: profileErr } = await sb.from("profiles").insert({
    id: userId, username, is_owner: isFirstUser
  });
  if (profileErr) return { error: "Account created but profile setup failed: " + profileErr.message };

  return { ok: true, session: data.session };
}

async function checkIfFirstUser() {
  const { count } = await sb.from("profiles").select("*", { count: "exact", head: true });
  return (count || 0) === 0;
}

async function signIn(username, password) {
  username = username.trim();
  const syntheticEmail = usernameToEmail(username);
  const { data, error } = await sb.auth.signInWithPassword({ email: syntheticEmail, password });
  if (error) return { error: "Incorrect username or password." };
  return { ok: true, session: data.session };
}

async function loadProfile(userId) {
  const { data, error } = await sb.from("profiles").select("*").eq("id", userId).single();
  if (error) return null;
  return data;
}

async function loadPlaylistsWithSongs() {
  const { data: playlists, error } = await sb.from("playlists").select("*").eq("owner_id", state.profile.id);
  if (error) { state.playlists = []; return; }
  const { data: links } = await sb.from("playlist_songs").select("*");
  state.playlists = playlists.map(p => ({
    ...p,
    songIds: (links || []).filter(l => l.playlist_id === p.id).map(l => l.song_id)
  }));
}

async function registerKnownDevice() {
  const token = getOrCreateDeviceToken();
  const label = guessDeviceLabel();
  await sb.from("known_devices").upsert({
    user_id: state.profile.id, device_token: token, device_label: label, last_seen_at: new Date().toISOString()
  }, { onConflict: "device_token" });
}

async function tryDeviceAutoLogin() {
  // The Supabase JS client persists its own session in localStorage already
  // (that's the primary "stay signed in" mechanism). known_devices exists so
  // the owner/account holder can see + revoke recognized devices, and so we
  // can show a friendly "Welcome back on <device>" note.
  const token = getOrCreateDeviceToken();
  const { data } = await sb.from("known_devices").select("device_label").eq("device_token", token).maybeSingle();
  if (data) state.rememberedDeviceLabel = data.device_label;
}

function signOut() {
  sb.auth.signOut();
  state.session = null;
  state.profile = null;
  state.songs = [];
  state.playlists = [];
  state.queue = [];
  hardStopBrokenPlayback(null);
  state.toast = null;
  render();
}

// ---------- initial load ----------
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    state.session = session;
    state.profile = await loadProfile(session.user.id);
    if (state.profile) {
      await registerKnownDevice();
      await loadPlaylistsWithSongs();
      await refreshSongs(true);
      await refreshArtists();
    } else {
      // session exists but no profile row (shouldn't normally happen) — sign out to recover
      await sb.auth.signOut();
      state.session = null;
    }
  } else {
    await tryDeviceAutoLogin();
  }
  state.authChecked = true;
  render();

  // Refresh shared songs whenever the tab regains focus/visibility —
  // this is the "app updates when the owner adds a file" mechanism for a
  // static site with no push channel.
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && state.profile) { refreshSongs(false); refreshArtists(); }
  });
  window.addEventListener("focus", () => { if (state.profile) refreshSongs(false); });
}

// =========================================================================
// RENDER
// =========================================================================
function render() {
  const app = document.getElementById("app");

  if (!state.authChecked) {
    app.innerHTML = `<div class="login-screen"><div class="spin" style="font-size:24px;">◐</div></div>`;
    return;
  }

  if (!state.profile && !window.__guestMode) {
    app.innerHTML = renderLogin();
    wireLoginEvents();
    return;
  }

  app.innerHTML = renderApp();
  wireAppEvents();
}

function renderLogin() {
  const isSignup = state.loginMode === "signup";
  return `
    <div class="login-screen">
      <div class="login-card">
        <div class="login-brand"><div class="mark">L</div><div class="name">Lumen</div></div>
        ${state.rememberedDeviceLabel ? `<div class="device-banner">Recognized this device (${escapeHtml(state.rememberedDeviceLabel)}) — sign in to continue where you left off.</div>` : ""}
        <div class="tab-row">
          <button class="tab-btn ${!isSignup ? "active" : ""}" id="tab-signin">Sign in</button>
          <button class="tab-btn ${isSignup ? "active" : ""}" id="tab-signup">Create account</button>
        </div>
        <p class="login-sub">${isSignup ? "Anyone can create an account to save liked songs and playlists. Only the owner can add or remove songs." : "Sign in to your account."}</p>
        <input type="text" id="auth-user" class="login-input" placeholder="Username" autofocus autocomplete="username">
        <input type="password" id="auth-pass" class="login-input" placeholder="Password" autocomplete="${isSignup ? "new-password" : "current-password"}">
        ${isSignup ? `<input type="password" id="auth-pass-confirm" class="login-input" placeholder="Confirm password" autocomplete="new-password">` : ""}
        <div class="login-error" id="login-error"></div>
        <button class="login-btn" id="auth-submit">${isSignup ? "Create account" : "Sign in"}</button>
        <div class="guest-link" id="guest-link">Continue as guest (listen only)</div>
        <p class="login-note">${isSignup ? "The very first account created automatically becomes the owner." : ""}</p>
      </div>
    </div>`;
}

function wireLoginEvents() {
  const guestLink = document.getElementById("guest-link");
  if (guestLink) guestLink.onclick = async () => {
    window.__guestMode = true;
    await refreshSongs(true);
    await refreshArtists();
    render();
  };

  const tabSignin = document.getElementById("tab-signin");
  const tabSignup = document.getElementById("tab-signup");
  if (tabSignin) tabSignin.onclick = () => { state.loginMode = "signin"; render(); };
  if (tabSignup) tabSignup.onclick = () => { state.loginMode = "signup"; render(); };

  const submitBtn = document.getElementById("auth-submit");
  if (submitBtn) {
    const doSubmit = async () => {
      const username = document.getElementById("auth-user").value;
      const password = document.getElementById("auth-pass").value;
      const err = document.getElementById("login-error");
      err.textContent = "";
      submitBtn.disabled = true;
      submitBtn.textContent = "Please wait…";

      let result;
      if (state.loginMode === "signup") {
        const confirm = document.getElementById("auth-pass-confirm").value;
        if (password !== confirm) {
          err.textContent = "Passwords don't match.";
          submitBtn.disabled = false; submitBtn.textContent = "Create account";
          return;
        }
        result = await signUp(username, password);
      } else {
        result = await signIn(username, password);
      }

      if (result.error) {
        err.textContent = result.error;
        submitBtn.disabled = false;
        submitBtn.textContent = state.loginMode === "signup" ? "Create account" : "Sign in";
        return;
      }

      state.session = result.session;
      state.profile = await loadProfile(result.session.user.id);
      await registerKnownDevice();
      await loadPlaylistsWithSongs();
      await refreshSongs(true);
      await refreshArtists();
      render();
    };
    submitBtn.onclick = doSubmit;
    document.getElementById("auth-pass").addEventListener("keydown", e => { if (e.key === "Enter") doSubmit(); });
  }
}

function renderApp() {
  const song = currentSong();
  const filtered = state.searchTerm
    ? state.songs.filter(s => s.title.toLowerCase().includes(state.searchTerm.toLowerCase()) || s.artist.toLowerCase().includes(state.searchTerm.toLowerCase()))
    : state.songs;
  const isOwner = state.profile?.is_owner;
  const isGuest = !state.profile;

  return `
    ${state.toast ? `<div class="toast ${state.toastIsError ? "error" : ""}">${escapeHtml(state.toast)}</div>` : ""}
    <div class="shell">
      ${renderSidebar(isOwner, isGuest)}
      <main class="main-panel">
        <div class="top-bar">
          <div class="search-wrap">
            <span>⌕</span>
            <input id="search-input" placeholder="Search songs or artists" value="${escapeHtml(state.searchTerm)}">
          </div>
          <div class="account-row">
            ${isGuest ? `<span class="user-badge">Guest</span><span class="signout-btn" id="signout-btn">Sign in</span>`
              : `${isOwner ? `<span class="owner-badge">★ Owner</span>` : `<span class="user-badge">${escapeHtml(state.profile.username)}</span>`}<span class="signout-btn" id="signout-btn">Sign out</span>`}
          </div>
        </div>
        <div class="scroll-area">${renderMainContent(filtered, isOwner)}</div>

}

            <p class="upload-main">Drop audio files here, or click to browse</p>
            <p class="upload-sub">MP3, WAV, M4A, OGG — title and artist are guessed from the filename, then you can fill in the rest</p>
          </div>
          <input type="file" id="file-input" accept="audio/*,.mp3,.wav,.ogg,.m4a,.aac,.flac" multiple style="display:none">
          <p class="modal-foot">Uploaded songs are stored centrally and appear for everyone using the app — no need to re-upload per device.</p>
        ` : `
          <div class="staged-list">
            ${state.stagedUploads.map(renderStagedUploadCard).join("")}
          </div>
        `}
      </div>
    </div>`;
}

function renderStagedUploadCard(entry) {
  const matches = entry.artistName
    ? state.artists.filter(a => a.name.toLowerCase().includes(entry.artistName.toLowerCase())).slice(0, 5)
    : [];
  const statusLabel = { editing: "", uploading: "Uploading…", done: "✓ Added", error: "✕ Failed" }[entry.status];
  return `
    <div class="staged-card" data-staged-id="${entry.localId}">
      <div class="staged-card-head">
        <span class="staged-filename">${escapeHtml(entry.file.name)}</span>
        ${statusLabel ? `<span class="staged-status ${entry.status}">${statusLabel}</span>` : ""}
      </div>
      <div class="staged-fields" ${entry.status !== "editing" ? 'style="opacity:.5;pointer-events:none;"' : ""}>
        <input class="login-input staged-title" placeholder="Title" value="${escapeHtml(entry.title)}">
        <div style="position:relative;">
          <input class="login-input staged-artist" placeholder="Primary artist" value="${escapeHtml(entry.artistName)}" autocomplete="off">
          <div class="staged-artist-list" style="display:none;">
            ${matches.map(a => `<div class="dropdown-item staged-artist-option" data-id="${a.id}" data-name="${escapeHtml(a.name)}">${escapeHtml(a.name)}</div>`).join("")}
          </div>
        </div>
        <input class="login-input staged-album" placeholder="Album (optional)" value="${escapeHtml(entry.album)}">
        <input class="login-input staged-features" placeholder="Featured artists, comma separated (optional)" value="${escapeHtml(entry.featureArtistIds.join(", "))}">
      </div>
      ${entry.status === "editing" ? `
        <div class="staged-actions">
          <button class="dropdown-item staged-remove" style="border:1px solid var(--border);border-radius:6px;justify-content:center;">Remove</button>
          <button class="primary-btn staged-confirm" style="flex:1;padding:9px;font-size:12.5px;justify-content:center;">Upload</button>
        </div>
      ` : ""}
    </div>`;
}

// =========================================================================
// EVENT WIRING
// =========================================================================
function wireAppEvents() {
  document.querySelectorAll("[data-action]").forEach(el => el.addEventListener("click", handleAction));

  const searchInput = document.getElementById("search-input");
  if (searchInput) {
    searchInput.addEventListener("input", e => {
      state.searchTerm = e.target.value;
      const cursorPos = e.target.selectionStart;
      render();
      const newInput = document.getElementById("search-input");
      if (newInput) { newInput.focus(); newInput.setSelectionRange(cursorPos, cursorPos); }
    });
  }

  const signoutBtn = document.getElementById("signout-btn");
  if (signoutBtn) signoutBtn.onclick = () => { if (!state.profile) { window.__guestMode = false; render(); } else signOut(); };

  // ---- upload modal: file picking ----
  const fileInput = document.getElementById("file-input");
  const uploadZone = document.getElementById("upload-zone");
  if (uploadZone && fileInput) {
    uploadZone.addEventListener("click", () => fileInput.click());
    uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("drag"); });
    uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag"));
    uploadZone.addEventListener("drop", e => {
      e.preventDefault(); uploadZone.classList.remove("drag");
      if (e.dataTransfer.files.length) stageFiles(e.dataTransfer.files);
    });
  }
  if (fileInput) fileInput.addEventListener("change", e => { if (e.target.files.length) stageFiles(e.target.files); });

  if (state.profile?.is_owner) {
    document.body.ondragover = e => e.preventDefault();
    document.body.ondrop = e => {
      e.preventDefault();
      if (e.dataTransfer.files.length) { state.showUploadModal = true; stageFiles(e.dataTransfer.files); }
    };
  } else {
    document.body.ondragover = null;
    document.body.ondrop = null;
  }

  // ---- staged upload metadata forms ----
  document.querySelectorAll("[data-staged-id]").forEach(card => {
    const localId = card.dataset.stagedId;
    const entry = stagedEntry(localId);
    if (!entry) return;

    const titleInput = card.querySelector(".staged-title");
    const artistInput = card.querySelector(".staged-artist");
    const albumInput = card.querySelector(".staged-album");
    const featuresInput = card.querySelector(".staged-features");
    const confirmBtn = card.querySelector(".staged-confirm");
    const removeBtn = card.querySelector(".staged-remove");

    if (titleInput) titleInput.addEventListener("input", e => { entry.title = e.target.value; });
    if (artistInput) {
      artistInput.addEventListener("input", e => { entry.artistName = e.target.value; });
      // simple autocomplete from known artists
      const list = card.querySelector(".staged-artist-list");
      if (list) {
        artistInput.addEventListener("focus", () => { list.style.display = "block"; });
        artistInput.addEventListener("blur", () => { setTimeout(() => { list.style.display = "none"; }, 150); });
      }
    }
    if (albumInput) albumInput.addEventListener("input", e => { entry.album = e.target.value; });
    if (featuresInput) featuresInput.addEventListener("input", e => {
      entry.featureArtistIds = e.target.value.split(",").map(s => s.trim()).filter(Boolean);
    });
    if (confirmBtn) confirmBtn.addEventListener("click", () => confirmStagedUpload(localId));
    if (removeBtn) removeBtn.addEventListener("click", () => removeStagedUpload(localId));

    card.querySelectorAll(".staged-artist-option").forEach(opt => {
      opt.addEventListener("mousedown", e => {
        e.preventDefault();
        entry.artistName = opt.dataset.name;
        entry.primaryArtistId = opt.dataset.id;
        if (artistInput) artistInput.value = opt.dataset.name;
      });
    });
  });

  // ---- artist detail page: bio + stream count editors ----
  const saveBioBtn = document.getElementById("save-bio-btn");
  if (saveBioBtn) {
    saveBioBtn.onclick = () => {
      const bio = document.getElementById("artist-bio-input").value;
      updateArtistBio(saveBioBtn.dataset.id, bio);
      showToast("Bio saved");
    };
  }
  const setStreamsBtn = document.getElementById("set-streams-btn");
  if (setStreamsBtn) {
    setStreamsBtn.onclick = () => {
      const val = parseInt(document.getElementById("artist-streams-input").value, 10);
      if (!isNaN(val) && val >= 0) {
        setArtistStreamsExact(setStreamsBtn.dataset.id, val);
        showToast("Stream count updated");
      }
    };
  }
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;
  const id = el.dataset.id;
  if (el.dataset.stopPropagation !== undefined) e.stopPropagation();

  switch (action) {
    case "go-home": state.view = { screen: "home", playlistId: null }; render(); break;
    case "go-artists": state.view = { screen: "artists" }; render(); break;
    case "open-artist": state.view = { screen: "artist-detail", artistId: id }; render(); break;
    case "open-new-artist": {
      if (!state.profile?.is_owner) break;
      const name = prompt("New artist name");
      if (name && name.trim()) {
        createArtistManually(name).then(() => {
          const newArtist = state.artists.find(a => a.name.toLowerCase() === name.trim().toLowerCase());
          if (newArtist) { state.view = { screen: "artist-detail", artistId: newArtist.id }; render(); }
        });
      }
      break;
    }
    case "delete-artist": {
      if (!state.profile?.is_owner) break;
      if (confirm("Delete this artist profile? Songs stay, but lose their artist link.")) {
        deleteArtist(id);
        state.view = { screen: "artists" };
        render();
      }
      break;
    }
    case "open-upload": if (state.profile?.is_owner) { state.showUploadModal = true; render(); } break;
    case "close-upload": state.showUploadModal = false; state.stagedUploads = []; render(); break;
    case "create-playlist": if (state.profile) createPlaylist(); break;
    case "open-playlist": state.view = { screen: "playlist", playlistId: id }; render(); break;
    case "rename-playlist": {
      const p = state.playlists.find(p => p.id === id);
      const name = prompt("Rename playlist", p?.name || "");
      if (name && name.trim()) renamePlaylist(id, name.trim());
      render();
      break;
    }
    case "play-song": {
      const list = state.view.screen === "playlist"
        ? state.playlists.find(p => p.id === state.view.playlistId).songIds.map(sid => state.songs.find(s => s.id === sid)).filter(Boolean)
        : (state.searchTerm ? state.songs.filter(s => s.title.toLowerCase().includes(state.searchTerm.toLowerCase()) || s.artist.toLowerCase().includes(state.searchTerm.toLowerCase())) : state.songs);
      playSongList(list, id);
      break;
    }
    case "toggle-play": togglePlay(); break;
    case "next": handleNext(false); break;
    case "prev": handlePrev(); break;
    case "seek": seekTo(e); break;
    case "toggle-shuffle": state.shuffle = !state.shuffle; prepareNext(); render(); break;
    case "toggle-repeat": state.repeat = !state.repeat; prepareNext(); render(); break;
    case "toggle-mute": state.muted = !state.muted; applyVolume(); render(); break;
    case "set-volume": {
      const rect = el.getBoundingClientRect();
      state.volume = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
      state.muted = false;
      applyVolume();
      render();
      break;
    }
    case "toggle-liked": if (state.profile) toggleLiked(id); break;
    case "toggle-song-menu": state.showSongMenuFor = state.showSongMenuFor === id ? null : id; render(); break;
    case "add-to-playlist": addToPlaylist(el.dataset.pid, el.dataset.sid); state.showSongMenuFor = null; break;
    case "delete-song": if (state.profile?.is_owner) { state.showSongMenuFor = null; removeSong(id); } break;
    case "remove-from-playlist": {
      const pid = el.dataset.pid;
      const p = state.playlists.find(p => p.id === pid);
      if (p) {
        p.songIds = p.songIds.filter(sid => sid !== id);
        sb.from("playlist_songs").delete().eq("playlist_id", pid).eq("song_id", id);
      }
      state.showSongMenuFor = null;
      render();
      break;
    }
    case "toggle-transition-menu": state.showTransitionMenu = !state.showTransitionMenu; render(); break;
    case "set-transition": state.transitionMode = el.dataset.mode; state.showTransitionMenu = false; render(); break;
  }
}

document.addEventListener("click", e => {
  if (!e.target.closest(".menu-wrap")) {
    if (state.showSongMenuFor || state.showTransitionMenu) {
      state.showSongMenuFor = null;
      state.showTransitionMenu = false;
      render();
    }
  }
});

init();
setTimeout(() => {
  const splash = document.getElementById("splash-screen");
  if (splash) splash.remove();
}, 2500);
</script>
</body>
