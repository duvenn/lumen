<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lumen</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%233DDC97%22/></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg:#0b0b0e; --surface:#131318; --surface-2:#1a1a22; --surface-hover:#20202a;
  --border:#232330; --text:#f4f4f6; --text-dim:#9d9dac; --text-faint:#6a6a78;
  --accent:#3DDC97; --accent-soft:rgba(61,220,151,0.16); --danger:#ff6b6b;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;}
button,input,textarea,select{touch-action:manipulation;font-family:inherit;}
#app{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;}

/* ---- Splash ---- */
.splash{position:fixed;inset:0;z-index:999;background:radial-gradient(circle at 50% 40%,#16241c,#0b0b0e 65%);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;animation:splash-out .5s ease 2s forwards;}
.splash-mark{width:88px;height:88px;border-radius:24px;background:linear-gradient(135deg,var(--accent),#1f6e4f);display:flex;align-items:center;justify-content:center;color:#06140d;font-weight:800;font-size:40px;box-shadow:0 20px 60px rgba(61,220,151,.25);opacity:0;transform:scale(.7);animation:mark-in .6s cubic-bezier(.2,.9,.3,1.3) .1s forwards;}
.splash-name{font-size:30px;font-weight:800;letter-spacing:-.02em;opacity:0;transform:translateY(8px);animation:text-in .5s ease .55s forwards;}
.splash-tag{font-size:12px;color:var(--text-faint);letter-spacing:.06em;text-transform:uppercase;opacity:0;animation:text-in .5s ease .85s forwards;}
@keyframes mark-in{to{opacity:1;transform:scale(1)}}
@keyframes text-in{to{opacity:1;transform:translateY(0)}}
@keyframes splash-out{to{opacity:0;visibility:hidden;pointer-events:none}}

/* ---- Layout ---- */
.shell{flex:1;display:flex;min-height:0;overflow:hidden;}

/* ---- Sidebar ---- */
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 10px 12px;gap:14px;overflow-y:auto;padding-left:max(10px,var(--safe-left));}
.brand{display:flex;align-items:center;gap:9px;padding:4px 8px;}
.brand-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#1f6e4f);color:#06140d;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;}
.brand-name{font-size:18px;font-weight:700;letter-spacing:-.02em;}
.nav-section{display:flex;flex-direction:column;gap:2px;}
.nav-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);padding:8px 10px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;border:none;background:transparent;color:var(--text-dim);font-size:13.5px;font-weight:600;cursor:pointer;text-align:left;width:100%;transition:background .12s,color .12s;}
.nav-item:hover{background:var(--surface-hover);color:var(--text);}
.nav-item.active{background:var(--surface-2);color:var(--text);}
.nav-item .nav-icon{width:18px;text-align:center;flex-shrink:0;}
.playlist-list{display:flex;flex-direction:column;gap:1px;flex:1;overflow-y:auto;}
.pl-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;border:none;background:transparent;color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;text-align:left;white-space:nowrap;overflow:hidden;width:100%;}
.pl-row:hover{background:var(--surface-hover);color:var(--text);}
.pl-row.active{background:var(--surface-2);color:var(--text);}
.pl-thumb{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;}
.liked-thumb{background:linear-gradient(135deg,#6F8CFF,#C77DFF);color:#fff;}
.plain-thumb{background:var(--surface-2);color:var(--text-faint);}
.sidebar-foot{font-size:11px;color:var(--text-faint);padding:8px 10px 0;border-top:1px solid var(--border);line-height:1.5;}

/* ---- Main panel ---- */
.main-panel{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}
.top-bar{display:flex;align-items:center;gap:10px;padding:14px 24px 6px;padding-top:max(14px,calc(var(--safe-top) + 8px));flex-shrink:0;}
.search-wrap{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;padding:8px 14px;color:var(--text-faint);max-width:320px;}
.search-wrap input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:16px;}
.search-wrap input::placeholder{color:var(--text-faint);}
.top-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.owner-badge{background:var(--accent-soft);color:var(--accent);}
.user-badge{background:var(--surface-2);color:var(--text-dim);}
.text-btn{font-size:12px;color:var(--text-faint);cursor:pointer;background:none;border:none;text-decoration:underline;}
.scroll-area{flex:1;overflow-y:auto;padding:10px 24px max(28px,calc(var(--safe-bottom) + 28px));-webkit-overflow-scrolling:touch;}

/* ---- Cards + grids ---- */
.section{margin-bottom:28px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-size:18px;font-weight:700;letter-spacing:-.01em;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
.song-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:8px;cursor:pointer;text-align:left;transition:background .12s;border:none;}
.song-card:hover{background:var(--surface-2);}
.card-art{width:100%;aspect-ratio:1;border-radius:7px;overflow:hidden;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85);position:relative;font-size:24px;background:var(--surface-2);}
.card-art img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.card-play{position:absolute;bottom:6px;right:6px;width:30px;height:30px;border-radius:50%;background:var(--accent);color:#06140d;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s;box-shadow:0 4px 12px rgba(0,0,0,.4);}
.song-card:hover .card-play{opacity:1;}
.card-title{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-sub{font-size:11.5px;color:var(--text-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ---- Song table ---- */
.song-table{display:flex;flex-direction:column;}
.table-head,.table-row{display:grid;grid-template-columns:36px 1fr 160px 64px 80px;align-items:center;gap:12px;padding:7px 8px;}
.table-head{color:var(--text-faint);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);margin-bottom:2px;}
.table-row{border-radius:7px;cursor:default;}
.table-row:hover{background:var(--surface-2);}
.col-idx{display:flex;align-items:center;justify-content:center;color:var(--text-faint);font-size:12.5px;}
.idx-play{display:none;background:transparent;border:none;color:var(--text);cursor:pointer;}
.table-row:hover .idx-num{display:none;}
.table-row:hover .idx-play{display:flex;align-items:center;justify-content:center;}
.col-title{display:flex;align-items:center;gap:9px;overflow:hidden;cursor:pointer;min-width:0;}
.mini-art{width:36px;height:36px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;position:relative;color:rgba(0,0,0,.5);}
.mini-art img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.title-stack{display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.song-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.song-name.now{color:var(--accent);}
.song-sub{font-size:11.5px;color:var(--text-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.col-album{font-size:12.5px;color:var(--text-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
.col-album:hover{color:var(--text);}
.col-dur{font-size:12.5px;color:var(--text-faint);text-align:right;}
.col-actions{display:flex;align-items:center;justify-content:flex-end;gap:2px;position:relative;}

/* ---- Buttons ---- */
.icon-btn{background:transparent;border:none;color:var(--text-dim);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;}
.icon-btn:hover{color:var(--text);background:var(--surface-hover);}
.icon-btn:disabled{opacity:.35;cursor:default;}
.icon-btn.sm{width:26px;height:26px;font-size:13px;}
.icon-btn.on{color:var(--accent);}
.heart-btn.liked{color:var(--accent);}
.primary-btn{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#06140d;border:none;border-radius:22px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;}
.primary-btn:hover{filter:brightness(1.08);}
.ghost-btn{display:inline-flex;align-items:center;gap:7px;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:22px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;}
.ghost-btn:hover{background:var(--surface-2);}

/* ---- Inputs ---- */
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-faint);}
.inp{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--text);font-size:16px;outline:none;font-family:inherit;}
.inp:focus{border-color:var(--accent);}
.inp.sm{font-size:14px;padding:9px 11px;}
textarea.inp{resize:vertical;min-height:70px;}

/* ---- Hero (playlist/album/artist) ---- */
.hero{display:flex;align-items:flex-end;gap:20px;padding:20px 24px 24px;margin:-10px -24px 20px;}
.hero-art{width:130px;height:130px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:48px;box-shadow:0 10px 30px rgba(0,0,0,.4);overflow:hidden;position:relative;background:var(--surface-2);color:var(--text-faint);}
.hero-art img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.hero-art.circle{border-radius:50%;}
.hero-info{display:flex;flex-direction:column;gap:5px;min-width:0;}
.hero-kicker{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);}
.hero-title{font-size:32px;font-weight:800;letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hero-title.editable{cursor:pointer;}
.hero-meta{font-size:12.5px;color:var(--text-dim);}
.hero-actions{display:flex;gap:8px;margin-top:4px;}

/* ---- Player bar ---- */
.player-bar{flex-shrink:0;height:calc(80px + var(--safe-bottom));background:var(--surface);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 2fr 1fr;align-items:center;padding:0 16px var(--safe-bottom);gap:12px;}
.player-left{display:flex;align-items:center;gap:10px;min-width:0;}
.player-art{width:46px;height:46px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85);flex-shrink:0;font-size:16px;overflow:hidden;position:relative;background:var(--surface-2);}
.player-art img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.player-meta{display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.player-title{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.player-artist{font-size:11.5px;color:var(--text-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.player-center{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%;max-width:560px;margin:0 auto;}
.transport{display:flex;align-items:center;gap:4px;}
.play-btn{width:34px;height:34px;border-radius:50%;background:var(--text);color:#0b0b0e;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;}
.play-btn:hover{transform:scale(1.05);}
.seek-row{display:flex;align-items:center;gap:8px;width:100%;}
.time{font-size:10.5px;color:var(--text-faint);width:34px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums;}
.seek-track{flex:1;height:12px;display:flex;align-items:center;cursor:pointer;position:relative;}
.seek-track::before{content:'';position:absolute;left:0;right:0;height:3px;border-radius:2px;background:var(--surface-2);}
.seek-fill{position:absolute;left:0;height:3px;border-radius:2px;background:var(--text);pointer-events:none;}
.seek-thumb{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--text);transform:translateX(-50%);pointer-events:none;}
.player-right{display:flex;align-items:center;justify-content:flex-end;gap:6px;}
.vol-track{width:80px;height:12px;display:flex;align-items:center;cursor:pointer;position:relative;}
.vol-track::before{content:'';position:absolute;left:0;right:0;height:3px;border-radius:2px;background:var(--surface-2);}
.vol-fill{position:absolute;left:0;height:3px;border-radius:2px;background:var(--text);pointer-events:none;}

/* ---- Dropdown ---- */
.menu-wrap{position:relative;}
.dropdown{position:absolute;right:0;top:30px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;min-width:185px;padding:5px;z-index:50;box-shadow:0 12px 28px rgba(0,0,0,.5);}
.dropdown.up{top:auto;bottom:30px;}
.dd-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-faint);padding:5px 8px 3px;}
.dd-item{display:flex;align-items:center;gap:7px;width:100%;text-align:left;background:transparent;border:none;color:var(--text);font-size:12.5px;padding:7px 8px;border-radius:5px;cursor:pointer;}
.dd-item:hover{background:var(--surface-hover);}
.dd-item.danger{color:var(--danger);}
.dd-sep{height:1px;background:var(--border);margin:4px 2px;}
.dd-empty{font-size:12px;color:var(--text-faint);padding:5px 8px;}
.transition-dropdown{width:220px;}
.dd-note{font-size:10.5px;color:var(--text-faint);padding:6px 8px 3px;border-top:1px solid var(--border);margin-top:3px;line-height:1.4;}

/* ---- Empty state ---- */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 20px;gap:10px;color:var(--text-dim);}
.empty-ico{width:60px;height:60px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-faint);margin-bottom:4px;font-size:26px;}
.empty-state h2{font-size:17px;color:var(--text);}
.empty-state p{font-size:13px;max-width:320px;line-height:1.5;}

/* ---- Login ---- */
.login-screen{position:fixed;inset:0;z-index:500;background:radial-gradient(circle at 30% 20%,#16241c,#0b0b0e 60%);display:flex;align-items:center;justify-content:center;padding:24px;padding-top:max(24px,var(--safe-top));padding-bottom:max(24px,var(--safe-bottom));overflow-y:auto;}
.login-card{width:100%;max-width:360px;display:flex;flex-direction:column;gap:13px;}
.login-brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:4px;}
.login-brand .lm{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#1f6e4f);display:flex;align-items:center;justify-content:center;color:#06140d;font-weight:800;font-size:20px;}
.login-brand .ln{font-size:28px;font-weight:800;letter-spacing:-.02em;}
.login-sub{text-align:center;color:var(--text-dim);font-size:13px;line-height:1.5;}
.tab-row{display:flex;background:var(--surface-2);border-radius:9px;padding:3px;gap:3px;}
.tab-btn{flex:1;background:transparent;border:none;color:var(--text-faint);font-size:13px;font-weight:600;padding:8px;border-radius:7px;cursor:pointer;}
.tab-btn.active{background:var(--surface-hover);color:var(--text);}
.login-error{color:var(--danger);font-size:12px;text-align:center;min-height:14px;}
.login-btn{width:100%;background:var(--accent);color:#06140d;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;}
.login-btn:hover{filter:brightness(1.08);}
.login-btn:disabled{opacity:.6;cursor:default;}
.link-btn{text-align:center;font-size:12px;color:var(--text-faint);cursor:pointer;background:none;border:none;width:100%;}
.link-btn:hover{color:var(--text-dim);}
.device-banner{background:var(--accent-soft);border:1px solid var(--accent);color:var(--accent);font-size:12px;border-radius:8px;padding:8px 12px;text-align:center;line-height:1.4;}

/* ---- Upload area (owner only page) ---- */
.upload-page{display:flex;flex-direction:column;gap:20px;}
.upload-zone{border:1.5px dashed var(--border);border-radius:10px;padding:32px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;color:var(--text-dim);cursor:pointer;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-soft);color:var(--text);}
.upload-zone-ico{font-size:28px;margin-bottom:2px;}
.upload-zone-main{font-size:13.5px;font-weight:600;}
.upload-zone-sub{font-size:12px;color:var(--text-faint);}
.staged-list{display:flex;flex-direction:column;gap:14px;}
.staged-card{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:12px;}
.staged-head{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.staged-fname{font-size:12px;color:var(--text-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.staged-status{font-size:11.5px;font-weight:700;flex-shrink:0;}
.staged-status.done{color:var(--accent);}
.staged-status.error{color:var(--danger);}
.staged-status.uploading{color:var(--text-dim);}
.staged-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.staged-fields .full{grid-column:1/-1;}
.staged-cover-preview{width:64px;height:64px;border-radius:7px;overflow:hidden;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0;position:relative;}
.staged-cover-preview img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.staged-row{display:flex;align-items:flex-start;gap:10px;}
.staged-actions{display:flex;gap:8px;padding-top:4px;}
.autocomplete-wrap{position:relative;}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-top:3px;max-height:130px;overflow-y:auto;z-index:60;box-shadow:0 12px 24px rgba(0,0,0,.45);}
.ac-item{padding:8px 10px;font-size:12.5px;cursor:pointer;color:var(--text);}
.ac-item:hover{background:var(--surface-hover);}

/* ---- Profile / artist / album pages ---- */
.stat-row{display:flex;gap:20px;margin-bottom:4px;}
.stat-item{display:flex;flex-direction:column;gap:2px;}
.stat-value{font-size:20px;font-weight:700;}
.stat-label{font-size:11px;color:var(--text-faint);}
.edit-panel{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
.edit-panel-title{font-size:13px;font-weight:700;color:var(--text-dim);}

/* ---- Toast ---- */
.toast{position:fixed;bottom:max(100px,calc(80px + var(--safe-bottom) + 16px));left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;padding:9px 16px;border-radius:9px;z-index:400;box-shadow:0 8px 20px rgba(0,0,0,.4);animation:toast-in .2s ease-out;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.err{border-color:var(--danger);color:var(--danger);}
@keyframes toast-in{from{opacity:0;transform:translate(-50%,6px)}to{opacity:1;transform:translate(-50%,0)}}

/* ---- Modal ---- */
.modal-veil{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:400px;max-width:92vw;max-height:85dvh;overflow-y:auto;padding:18px;box-shadow:0 20px 50px rgba(0,0,0,.5);}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.modal-head h3{font-size:15px;font-weight:700;}

/* ---- Mobile bottom nav ---- */
.bottom-nav{display:none;position:fixed;left:0;right:0;bottom:0;height:calc(56px + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--surface);border-top:1px solid var(--border);z-index:60;}
.bottom-nav-inner{display:flex;height:56px;}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:transparent;border:none;color:var(--text-faint);font-size:10px;font-weight:600;cursor:pointer;}
.bn-item.active{color:var(--text);}
.bn-ico{font-size:20px;line-height:1;}

/* ---- Mini player (mobile) ---- */
.mini-player{display:none;position:fixed;left:0;right:0;bottom:calc(56px + var(--safe-bottom));height:58px;background:var(--surface-2);border-top:1px solid var(--border);align-items:center;gap:4px;padding:0 8px 0 10px;z-index:55;}
.mini-progress{position:absolute;top:0;left:0;height:2px;background:var(--accent);}
.mini-body{flex:1;display:flex;align-items:center;gap:9px;min-width:0;background:transparent;border:none;cursor:pointer;text-align:left;}
.mini-art{width:36px;height:36px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;position:relative;}
.mini-art img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}

/* ---- Now playing (mobile full screen) ---- */
.now-playing{position:fixed;inset:0;z-index:90;display:flex;flex-direction:column;padding:16px 20px max(24px,var(--safe-bottom));}
.np-head{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.np-title-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);}
.np-art-wrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;padding:16px 0;}
.np-art{width:min(75vw,280px);height:min(75vw,280px);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:64px;box-shadow:0 24px 60px rgba(0,0,0,.5);overflow:hidden;position:relative;}
.np-art img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.np-meta{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.np-info{flex:1;min-width:0;}
.np-song-title{font-size:20px;font-weight:800;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.np-song-artist{font-size:13.5px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.np-seek{margin-bottom:16px;}
.np-times{display:flex;justify-content:space-between;margin-top:3px;}
.np-times .time{width:auto;}
.np-transport{display:flex;align-items:center;justify-content:center;gap:20px;}
.np-play{width:62px;height:62px;font-size:20px;}
.icon-btn.lg{width:44px;height:44px;font-size:20px;color:var(--text);}

/* ---- Scrollbar ---- */
::-webkit-scrollbar{width:7px;}
::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

/* ---- TABLET (680-980px) ---- */
@media(max-width:980px)and(min-width:680px){
  .sidebar{width:64px;padding:14px 6px;}
  .brand-name,.nav-item span,.nav-label,.pl-row span,.sidebar-foot{display:none;}
  .nav-item{justify-content:center;padding:10px;}
  .pl-row{justify-content:center;padding:8px;}
  .player-bar{grid-template-columns:1fr 2fr 56px;}
  .vol-track{display:none;}
}

/* ---- MOBILE (<680px) ---- */
@media(max-width:679px){
  .sidebar,.player-bar{display:none;}
  .bottom-nav,.mini-player{display:flex;}
  .top-bar{padding-top:max(14px,calc(var(--safe-top) + 6px));}
  .scroll-area{padding-bottom:calc(56px + var(--safe-bottom) + 64px);}
  .card-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .table-head .col-album,.table-row .col-album{display:none;}
  .table-head,.table-row{grid-template-columns:30px 1fr 56px 70px;}
  .hero-title{font-size:22px;}
  .hero-art{width:88px;height:88px;}
  .staged-fields{grid-template-columns:1fr;}
}

<body>
<div class="splash" id="splash">
  <div class="splash-mark">L</div>
  <div class="splash-name">Lumen</div>
  <div class="splash-tag">Your sound, shared</div>
</div>
<div id="app"></div>

<script>
const SUPABASE_URL = "https://jlcqvuagjeedrghmeety.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsY3F2dWFnamVlZHJnaG1lZXR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMDUwNzIsImV4cCI6MjA5NzU4MTA3Mn0.DhSeOkLgCVvL_xZ3MD1LMEasjU5VwdBslA_Mtbm-5NQ";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── helpers ─────────────────────────────────────────────────────────────────
function uid(){return crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2)+Date.now().toString(36);}
function fmtTime(s){if(!s||isNaN(s))return"0:00";const m=Math.floor(s/60);return`${m}:${Math.floor(s%60).toString().padStart(2,"0")}`;}
function fmtNum(n){return(n||0).toLocaleString();}
const ACCENTS=["#3DDC97","#FF6B6B","#FFD166","#6F8CFF","#C77DFF","#FF8FAB"];
function colorFor(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return ACCENTS[h%ACCENTS.length];}
function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
function publicUrl(bucket,path){return path?sb.storage.from(bucket).getPublicUrl(path).data.publicUrl:null;}
function usernameToEmail(u){const c=u.toLowerCase().replace(/[^a-z0-9_.-]/g,"");return`${c||"user"+Date.now().toString(36)}@lumen-user.app`;}

// ── device token ─────────────────────────────────────────────────────────────
const DTKEY="lumen-device-token";
function deviceToken(){let t=localStorage.getItem(DTKEY);if(!t){t=uid();localStorage.setItem(DTKEY,t);}return t;}
function deviceLabel(){const ua=navigator.userAgent;let os="Device";if(/iPhone/.test(ua))os="iPhone";else if(/iPad/.test(ua))os="iPad";else if(/Android/.test(ua))os="Android";else if(/Mac/.test(ua))os="Mac";else if(/Win/.test(ua))os="Windows";let br="";if(/Edg\//.test(ua))br="Edge";else if(/Chrome\//.test(ua))br="Chrome";else if(/Firefox\//.test(ua))br="Firefox";else if(/Safari\//.test(ua))br="Safari";return br?`${os} · ${br}`:os;}

// ── app state ────────────────────────────────────────────────────────────────
const S={
  authChecked:false, profile:null, session:null,
  songs:[], artists:[], albums:[], playlists:[],
  view:{screen:"home"},
  queue:[], qi:0, playing:false,
  progress:0, duration:0,
  volume:.8, muted:false, shuffle:false, repeat:false,
  searchTerm:"",
  transitionMode:"short",
  showTransMenu:false, songMenuFor:null,
  loginMode:"signin",
  stagedUploads:[],   // files waiting for metadata
  nowPlayingOpen:false,
  mobileNav:"home",
  toast:null, toastErr:false,
  rememberedDevice:null,
};
const FADE_MS={off:0,short:4000,long:9000,gapless:0};
const TRANS_LABELS={off:"No transition",short:"Crossfade (4s)",long:"Crossfade (9s)",gapless:"Gapless"};

// ── audio engine ─────────────────────────────────────────────────────────────
const dA=new Audio(),dB=new Audio();
let aD=dA,sD=dB,transitioning=false,prepId=null;

function curSong(){return S.queue.length?S.songs.find(s=>s.id===S.queue[S.qi]):null;}
function applyVol(){aD.volume=S.muted?0:S.volume;}

function hardStop(msg){
  [dA,dB].forEach(d=>{try{d.pause();}catch(e){}d.removeAttribute("src");d.load();});
  transitioning=false;prepId=null;S.playing=false;S.progress=0;S.duration=0;
  if(msg)toast(msg,true);render();
}

function loadFresh(song,play){
  transitioning=false;prepId=null;
  sD.pause();sD.removeAttribute("src");
  aD.src=song.publicUrl;aD.dataset.sid=song.id;aD.currentTime=0;applyVol();
  if(play){
    aD.play().then(()=>recordPlay(song.id)).catch(()=>{
      if(aD.error||aD.networkState===HTMLMediaElement.NETWORK_NO_SOURCE)hardStop("That file seems to be missing.");
      else{S.playing=false;render();}
    });
  }
}

[dA,dB].forEach(d=>{
  d.addEventListener("error",()=>{if(d===aD)hardStop("Playback error — file may be missing.");});
  d.addEventListener("stalled",()=>{if(d===aD)setTimeout(()=>{if(d===aD&&d.error)hardStop("Playback stalled.");},4000);});
});

function prepNext(){
  const n=peekNext();if(!n||prepId===n.id)return;
  sD.src=n.publicUrl;sD.dataset.sid=n.id;sD.currentTime=0;sD.load();prepId=n.id;
}
function peekNext(){
  if(!S.queue.length)return null;
  let i=S.shuffle?((S.qi+1)%S.queue.length):(S.qi+1);
  if(!S.shuffle&&i>=S.queue.length)i=S.repeat?0:-1;
  return i<0?null:S.songs.find(s=>s.id===S.queue[i])||null;
}

function beginTransition(){
  if(transitioning||!prepId)return false;
  const fms=FADE_MS[S.transitionMode];
  transitioning=true;
  const out=aD,inn=sD;
  inn.volume=fms>0?0:(S.muted?0:S.volume);
  inn.currentTime=0;inn.play().catch(()=>{});
  if(fms>0){
    const steps=20,st=fms/steps;let i=0;
    const tv=S.muted?0:S.volume;
    const t=setInterval(()=>{
      i++;const p=i/steps;
      out.volume=Math.max(0,tv*(1-p));inn.volume=Math.min(tv,tv*p);
      if(i>=steps){clearInterval(t);out.pause();out.currentTime=0;finishTrans(out,inn);}
    },st);
  }else{out.pause();out.currentTime=0;finishTrans(out,inn);}
  return true;
}
function finishTrans(out,inn){
  aD=inn;sD=out;transitioning=false;prepId=null;
  const idx=S.queue.indexOf(aD.dataset.sid);
  if(idx>=0)S.qi=idx;
  prepNext();render();
}

requestAnimationFrame(function tick(){
  const dur=aD.duration,cur=aD.currentTime;
  if(dur&&!isNaN(dur)){
    S.progress=cur;S.duration=dur;
    const rem=dur-cur,fms=FADE_MS[S.transitionMode];
    if(!transitioning&&rem<=(fms>0?fms/1000+.4:.25)&&rem>0&&prepId)beginTransition();
    updateSeek();
  }
  requestAnimationFrame(tick);
});

function updateSeek(){
  const f=document.querySelector(".seek-fill"),th=document.querySelector(".seek-thumb"),ts=document.querySelectorAll(".player-bar .time");
  if(f&&S.duration){const p=(S.progress/S.duration)*100;f.style.width=p+"%";if(th)th.style.left=p+"%";}
  if(ts[0])ts[0].textContent=fmtTime(S.progress);
  if(ts[1])ts[1].textContent=fmtTime(S.duration);
  const mp=document.querySelector(".mini-progress");
  if(mp&&S.duration)mp.style.width=((S.progress/S.duration)*100)+"%";
}

aD.addEventListener("ended",()=>{if(!transitioning)handleNext(true);});
dA.addEventListener("play",()=>{if(aD===dA)S.playing=true;});
dB.addEventListener("play",()=>{if(aD===dB)S.playing=true;});

// ── playback controls ────────────────────────────────────────────────────────
function playSongList(list,startId){
  S.queue=list.map(s=>s.id);
  S.qi=Math.max(0,S.queue.indexOf(startId));
  const song=curSong();if(song){loadFresh(song,true);S.playing=true;prepNext();}
  render();
}
function togglePlay(){
  const song=curSong();
  if(!song){if(S.songs.length)playSongList(S.songs,S.songs[0].id);return;}
  if(S.playing){aD.pause();S.playing=false;}else{aD.play().catch(()=>{});S.playing=true;}
  render();
}
function handleNext(auto){
  if(!S.queue.length)return;
  if(S.repeat&&auto&&S.queue.length===1){aD.currentTime=0;aD.play();return;}
  if(!auto&&prepId){if(beginTransition())return;}
  let n=S.shuffle?Math.floor(Math.random()*S.queue.length):S.qi+1;
  if(n>=S.queue.length){if(!S.repeat){S.playing=false;render();return;}n=0;}
  S.qi=n;const song=curSong();if(song){loadFresh(song,true);S.playing=true;prepNext();}
  render();
}
function handlePrev(){
  if(aD.currentTime>3){aD.currentTime=0;return;}
  S.qi=S.qi-1<0?S.queue.length-1:S.qi-1;
  const song=curSong();if(song){loadFresh(song,true);S.playing=true;prepNext();}
  render();
}
function seekTo(e){
  const r=e.currentTarget.getBoundingClientRect(),p=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
  if(S.duration)aD.currentTime=p*S.duration;
}

// ── liked / playlists ────────────────────────────────────────────────────────
function likedPl(){return S.playlists.find(p=>p.is_liked);}
function isLiked(sid){return likedPl()?.songIds.includes(sid)||false;}
async function toggleLiked(sid){
  if(!S.profile)return;
  const pl=likedPl();if(!pl)return;
  const has=pl.songIds.includes(sid);
  if(has){pl.songIds=pl.songIds.filter(id=>id!==sid);await sb.from("playlist_songs").delete().eq("playlist_id",pl.id).eq("song_id",sid);}
  else{pl.songIds=[sid,...pl.songIds];await sb.from("playlist_songs").insert({playlist_id:pl.id,song_id:sid});}
  render();
}
async function createPlaylist(){
  if(!S.profile)return;
  const{data,error}=await sb.from("playlists").insert({owner_id:S.profile.id,name:`Playlist ${S.playlists.length}`,is_liked:false}).select().single();
  if(error){toast("Couldn't create playlist",true);return;}
  S.playlists.push({...data,songIds:[]});
  S.view={screen:"playlist",id:data.id};render();
}
async function renamePlaylist(id,name){
  const p=S.playlists.find(p=>p.id===id);if(p)p.name=name;
  await sb.from("playlists").update({name}).eq("id",id);
}
async function addToPlaylist(pid,sid){
  const p=S.playlists.find(p=>p.id===pid);
  if(p&&!p.songIds.includes(sid)){p.songIds.push(sid);await sb.from("playlist_songs").insert({playlist_id:pid,song_id:sid});toast("Added to playlist");render();}
}

// ── toast ─────────────────────────────────────────────────────────────────────
function toast(msg,err){
  S.toast=msg;S.toastErr=!!err;render();
  setTimeout(()=>{S.toast=null;render();},2600);
}

// ── data loading ──────────────────────────────────────────────────────────────
async function loadSongs(){
  const{data}=await sb.from("songs").select("*").order("added_at",{ascending:false});
  if(data)S.songs=data.map(r=>({...r,publicUrl:publicUrl("songs",r.storage_path),coverUrl:publicUrl("covers",r.cover_art_path)}));
}
async function loadArtists(){
  const{data}=await sb.from("artists").select("*").order("name");
  if(data)S.artists=data.map(a=>({...a,color:colorFor(a.name)}));
}
async function loadAlbums(){
  const{data}=await sb.from("albums").select("*").order("name");
  if(data)S.albums=data.map(a=>({...a,coverUrl:publicUrl("covers",a.cover_art_path)}));
}
async function loadPlaylists(){
  if(!S.profile)return;
  const{data:pls}=await sb.from("playlists").select("*").eq("owner_id",S.profile.id);
  const{data:links}=await sb.from("playlist_songs").select("*");
  S.playlists=(pls||[]).map(p=>({...p,songIds:(links||[]).filter(l=>l.playlist_id===p.id).map(l=>l.song_id)}));
}
async function refreshAll(silent){
  const prev=new Set(S.songs.map(s=>s.id));
  await Promise.all([loadSongs(),loadArtists(),loadAlbums()]);
  const newOnes=S.songs.filter(s=>!prev.has(s.id));
  if(!silent&&newOnes.length)toast(`${newOnes.length} new song${newOnes.length>1?"s":""} added`);
  render();
}
async function recordPlay(sid){
  try{
    await sb.rpc("increment_play_count",{p_song_id:sid});
    const s=S.songs.find(s=>s.id===sid);if(s)s.play_count=(s.play_count||0)+1;
    if(s?.primary_artist_id){const a=S.artists.find(a=>a.id===s.primary_artist_id);if(a)a.auto_streams=(a.auto_streams||0)+1;}
  }catch(e){}
}

// ── artist helpers ────────────────────────────────────────────────────────────
function artistStreams(a){return(a.auto_streams||0)+(a.manual_stream_adjustment||0);}
async function resolveArtist(name){
  name=name.trim();if(!name)return null;
  const ex=S.artists.find(a=>a.name.toLowerCase()===name.toLowerCase());
  if(ex)return ex.id;
  const{data,error}=await sb.from("artists").insert({name,created_by:S.profile.id}).select().single();
  if(error){console.error(error);return null;}
  S.artists.push({...data,color:colorFor(name)});
  return data.id;
}
async function resolveAlbum(name,artistId){
  if(!name)return null;
  name=name.trim();
  const ex=S.albums.find(a=>a.name.toLowerCase()===name.toLowerCase());
  if(ex)return ex.id;
  const{data,error}=await sb.from("albums").insert({name,artist_id:artistId||null,created_by:S.profile.id}).select().single();
  if(error){console.error(error);return null;}
  S.albums.push({...data,coverUrl:null});
  return data.id;
}

// ── UPLOAD FLOW ───────────────────────────────────────────────────────────────
function stageFiles(fl){
  const files=Array.from(fl).filter(f=>f.type.startsWith("audio/")||/\.(mp3|wav|ogg|m4a|aac|flac)$/i.test(f.name));
  if(!files.length){toast("No supported audio files",true);return;}
  const entries=files.map(f=>{
    const raw=f.name.replace(/\.[^/.]+$/,"");
    let title=raw,artist="";
    if(raw.includes(" - ")){const[a,b]=raw.split(" - ");artist=a.trim();title=b.trim();}
    return{localId:uid(),file:f,title,artist,album:"",features:"",coverFile:null,coverPreview:null,status:"editing"};
  });
  S.stagedUploads=[...S.stagedUploads,...entries];
  if(S.view.screen!=="upload")S.view={screen:"upload"};
  render();
}

function probeDuration(file){
  return new Promise(resolve=>{
    const url=URL.createObjectURL(file),a=new Audio();
    a.preload="metadata";a.src=url;
    a.addEventListener("loadedmetadata",()=>{resolve(a.duration||0);URL.revokeObjectURL(url);});
    a.addEventListener("error",()=>{resolve(0);URL.revokeObjectURL(url);});
  });
}

async function confirmUpload(localId){
  const e=S.stagedUploads.find(e=>e.localId===localId);
  if(!e||e.status==="uploading")return;
  if(!e.title.trim()){toast("Title is required",true);return;}
  e.status="uploading";render();
  try{
    const dur=await probeDuration(e.file);
    const ext=e.file.name.split(".").pop();
    const sp=`${S.profile.id}/${uid()}.${ext}`;

    // upload audio
    const{error:upErr}=await sb.storage.from("songs").upload(sp,e.file,{contentType:e.file.type||"audio/mpeg",upsert:false});
    if(upErr)throw upErr;

    // upload cover if provided
    let coverPath=null;
    if(e.coverFile){
      const cext=e.coverFile.name.split(".").pop();
      const cp=`${S.profile.id}/${uid()}.${cext}`;
      const{error:cErr}=await sb.storage.from("covers").upload(cp,e.coverFile,{contentType:e.coverFile.type||"image/jpeg",upsert:false});
      if(!cErr)coverPath=cp;
    }

    // resolve artist + album
    const primaryId=await resolveArtist(e.artist);
    const albumId=await resolveAlbum(e.album,primaryId);

    // insert song row
    const{data:row,error:insErr}=await sb.from("songs").insert({
      title:e.title.trim(),
      artist:e.artist.trim()||"Unknown artist",
      album:e.album.trim()||"Local upload",
      duration:dur,color:colorFor(e.title+uid()),
      storage_path:sp,cover_art_path:coverPath,
      uploaded_by:S.profile.id,
      primary_artist_id:primaryId,
      album_id:albumId,
    }).select().single();
    if(insErr)throw insErr;

    // link primary artist in song_artists
    if(primaryId)await sb.from("song_artists").insert({song_id:row.id,artist_id:primaryId,role:"primary"});
    // link features
    for(const fname of e.features.split(",").map(s=>s.trim()).filter(Boolean)){
      const fid=await resolveArtist(fname);
      if(fid)await sb.from("song_artists").insert({song_id:row.id,artist_id:fid,role:"feature"}).catch(()=>{});
    }

    // update cover on album if this is the first song with one
    if(albumId&&coverPath){
      const al=S.albums.find(a=>a.id===albumId);
      if(al&&!al.cover_art_path){al.cover_art_path=coverPath;al.coverUrl=publicUrl("covers",coverPath);await sb.from("albums").update({cover_art_path:coverPath}).eq("id",albumId);}
    }

    S.songs.unshift({...row,publicUrl:publicUrl("songs",sp),coverUrl:publicUrl("covers",coverPath)});
    e.status="done";
    toast(`"${row.title}" added`);
    render();
    setTimeout(()=>{
      S.stagedUploads=S.stagedUploads.filter(x=>x.localId!==localId);
      render();
    },800);
  }catch(err){
    console.error(err);e.status="error";toast("Upload failed: "+err.message,true);render();
  }
}

async function deleteSong(id){
  const song=S.songs.find(s=>s.id===id);if(!song)return;
  if(aD.dataset.sid===id)hardStop("Song removed");
  await sb.storage.from("songs").remove([song.storage_path]);
  if(song.cover_art_path)await sb.storage.from("covers").remove([song.cover_art_path]);
  await sb.from("songs").delete().eq("id",id);
  S.songs=S.songs.filter(s=>s.id!==id);
  S.playlists.forEach(p=>{p.songIds=p.songIds.filter(s=>s!==id);});
  S.queue=S.queue.filter(s=>s!==id);
  toast("Removed");render();
}

// ── artist / album editors ───────────────────────────────────────────────────
async function saveArtistBio(id,bio){const a=S.artists.find(a=>a.id===id);if(a)a.bio=bio;await sb.from("artists").update({bio}).eq("id",id);toast("Saved");}
async function saveArtistStreams(id,val){
  const a=S.artists.find(a=>a.id===id);if(!a)return;
  const adj=val-(a.auto_streams||0);a.manual_stream_adjustment=adj;
  await sb.from("artists").update({manual_stream_adjustment:adj}).eq("id",id);toast("Updated");render();
}
async function deleteArtist(id){await sb.from("artists").delete().eq("id",id);S.artists=S.artists.filter(a=>a.id!==id);S.view={screen:"artists"};render();}
async function deleteAlbum(id){await sb.from("albums").delete().eq("id",id);S.albums=S.albums.filter(a=>a.id!==id);S.view={screen:"albums"};render();}

// ── auth ──────────────────────────────────────────────────────────────────────
async function signUp(username,password){
  username=username.trim();
  if(username.length<3)return{error:"Username must be at least 3 characters."};
  if(password.length<6)return{error:"Password must be at least 6 characters."};
  const email=usernameToEmail(username);
  const{data,error}=await sb.auth.signUp({email,password});
  if(error)return{error:/already registered/i.test(error.message)?"That username is taken.":error.message};
  const uid2=data.user.id;
  const{count}=await sb.from("profiles").select("*",{count:"exact",head:true});
  const isFirst=(count||0)===0;
  const{error:pe}=await sb.from("profiles").insert({id:uid2,username,is_owner:isFirst});
  if(pe)return{error:"Account created but profile setup failed."};
  return{ok:true,session:data.session};
}
async function signIn(username,password){
  const{data,error}=await sb.auth.signInWithPassword({email:usernameToEmail(username.trim()),password});
  if(error)return{error:"Incorrect username or password."};
  return{ok:true,session:data.session};
}
async function loadProfile(uid){const{data}=await sb.from("profiles").select("*").eq("id",uid).single();return data;}
async function registerDevice(){
  if(!S.profile)return;
  await sb.from("known_devices").upsert({user_id:S.profile.id,device_token:deviceToken(),device_label:deviceLabel(),last_seen_at:new Date().toISOString()},{onConflict:"device_token"});
}
async function checkDevice(){
  const{data}=await sb.from("known_devices").select("device_label").eq("device_token",deviceToken()).maybeSingle();
  if(data)S.rememberedDevice=data.device_label;
}
function signOut(){
  sb.auth.signOut();Object.assign(S,{profile:null,session:null,songs:[],artists:[],albums:[],playlists:[],queue:[],playing:false,toast:null,stagedUploads:[]});
  localStorage.removeItem("lumen-session-owner");
  hardStop(null);render();
}

// ── init ──────────────────────────────────────────────────────────────────────
async function init(){
  await checkDevice();
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    S.session=session;
    S.profile=await loadProfile(session.user.id);
    if(S.profile){await Promise.all([registerDevice(),loadPlaylists(),loadSongs(),loadArtists(),loadAlbums()]);}
    else{await sb.auth.signOut();S.session=null;}
  }
  S.authChecked=true;render();
  setTimeout(()=>{const sp=document.getElementById("splash");if(sp)sp.remove();},2500);
  document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"&&S.profile)refreshAll(false);});
  window.addEventListener("focus",()=>{if(S.profile)refreshAll(false);});
}

function render(){

// ── Login ─────────────────────────────────────────────────────────────────────
function renderLogin(){
  const up=S.loginMode==="signup";
  return`<div class="login-screen"><div class="login-card">
    <div class="login-brand"><div class="lm">L</div><div class="ln">Lumen</div></div>
    ${S.rememberedDevice?`<div class="device-banner">Recognized: ${esc(S.rememberedDevice)}<br>Sign in to continue where you left off.</div>`:""}
    <div class="tab-row">
      <button class="tab-btn${!up?" active":""}" id="tab-si">Sign in</button>
      <button class="tab-btn${up?" active":""}" id="tab-su">Create account</button>
    </div>
    <p class="login-sub">${up?"Anyone can make an account to save playlists. Only the first account becomes owner.":"Sign in to your account."}</p>
    <input class="inp" id="auth-user" placeholder="Username" autocomplete="username">
    <input class="inp" type="password" id="auth-pass" placeholder="Password" autocomplete="${up?"new-password":"current-password"}">
    ${up?`<input class="inp" type="password" id="auth-pass2" placeholder="Confirm password" autocomplete="new-password">`:""}
    <div class="login-error" id="auth-err"></div>
    <button class="login-btn" id="auth-submit">${up?"Create account":"Sign in"}</button>
    <button class="link-btn" id="guest-link">Continue as guest (listen only)</button>
    ${up?`<p class="login-sub" style="font-size:11px;">The very first account becomes the owner automatically.</p>`:""}
  </div></div>`;
}
function wireLogin(){
  document.getElementById("tab-si")?.addEventListener("click",()=>{S.loginMode="signin";render();});
  document.getElementById("tab-su")?.addEventListener("click",()=>{S.loginMode="signup";render();});
  document.getElementById("guest-link")?.addEventListener("click",async()=>{window.__guest=true;await refreshAll(true);render();});
  const sub=document.getElementById("auth-submit");
  const doAuth=async()=>{
    const u=document.getElementById("auth-user").value,p=document.getElementById("auth-pass").value;
    const err=document.getElementById("auth-err");err.textContent="";
    sub.disabled=true;sub.textContent="Please wait…";
    if(S.loginMode==="signup"){
      const p2=document.getElementById("auth-pass2").value;
      if(p!==p2){err.textContent="Passwords don't match.";sub.disabled=false;sub.textContent="Create account";return;}
      const r=await signUp(u,p);
      if(r.error){err.textContent=r.error;sub.disabled=false;sub.textContent="Create account";return;}
      if(r.session){S.session=r.session;S.profile=await loadProfile(r.session.user.id);await Promise.all([registerDevice(),loadPlaylists(),loadSongs(),loadArtists(),loadAlbums()]);render();}
      else{err.textContent="Account created! Sign in to continue.";S.loginMode="signin";sub.disabled=false;render();}
    }else{
      const r=await signIn(u,p);
      if(r.error){err.textContent=r.error;sub.disabled=false;sub.textContent="Sign in";return;}
      S.session=r.session;S.profile=await loadProfile(r.session.user.id);
      await Promise.all([registerDevice(),loadPlaylists(),loadSongs(),loadArtists(),loadAlbums()]);render();
    }
  };
  sub?.addEventListener("click",doAuth);
  document.getElementById("auth-pass")?.addEventListener("keydown",e=>{if(e.key==="Enter")doAuth();});
  document.getElementById("auth-user")?.addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("auth-pass")?.focus();});
}

      const cnt=S.songs.filter(s=>s.album_id===al.id).length;
      return`<button class="song-card" data-go="album" data-id="${al.id}">
        <div class="card-art" style="background:linear-gradient(135deg,${a?.color||"#3DDC97"},#14141a)">
          ${al.coverUrl?`<img src="${esc(al.coverUrl)}" alt="" loading="lazy">`:"◉"}
        </div>
        <div class="card-title">${esc(al.name)}</div>
        <div class="card-sub">${a?esc(a.name):"Unknown"} · ${cnt} song${cnt===1?"":"s"}</div>
      </button>`;}).join("")}
    </div>`}
  </div>`;
}

// ── Album detail page ─────────────────────────────────────────────────────────
function renderAlbumPage(id,isOwner){
  const al=S.albums.find(a=>a.id===id);
  if(!al)return`<div class="empty-state"><p>Album not found.</p></div>`;
  const artist=S.artists.find(a=>a.id===al.artist_id);
  const songs=S.songs.filter(s=>s.album_id===id);
  const accent=artist?.color||"#3DDC97";
  return`
    <div class="hero" style="background:linear-gradient(160deg,${accent}33,transparent 70%)">
      <div class="hero-art" style="background:linear-gradient(135deg,${accent},#14141a)">
        ${al.coverUrl?`<img src="${esc(al.coverUrl)}" alt="" loading="lazy">`:"◉"}
      </div>
      <div class="hero-info">
        <span class="hero-kicker">Album</span>
        <div class="hero-title">${esc(al.name)}</div>
        <div class="hero-meta">${artist?`<span data-go="artist" data-id="${artist.id}" style="cursor:pointer;text-decoration:underline;">${esc(artist.name)}</span> · `:""}${songs.length} song${songs.length===1?"":"s"}</div>
        ${songs.length?`<div class="hero-actions"><button class="primary-btn" data-play-list="${id}">▶ Play all</button></div>`:``}
      </div>
    </div>
    ${isOwner?`<div class="edit-panel">

}

// ── Playlist page ─────────────────────────────────────────────────────────────
function renderPlaylistPage(id,isOwner,isGuest){
  const pl=S.playlists.find(p=>p.id===id);
  if(!pl)return`<div class="empty-state"><p>Playlist not found.</p></div>`;
  const songs=pl.songIds.map(sid=>S.songs.find(s=>s.id===sid)).filter(Boolean);
  const accent=songs[0]?.color||"#3DDC97";
  const isLikedPl=pl.is_liked;
  return`
    <div class="hero" style="background:linear-gradient(160deg,${accent}33,transparent 70%)">
      <div class="hero-art${isLikedPl?" liked-art":""}" style="${isLikedPl?"background:linear-gradient(135deg,#6F8CFF,#C77DFF);color:#fff":""}">
        ${isLikedPl?"♥":"≡"}
      </div>
      <div class="hero-info">
        <span class="hero-kicker">Playlist</span>
        <div class="hero-title${!isLikedPl?" editable":""}"${!isLikedPl?` data-rename="${pl.id}"`:""}>${esc(pl.name)}</div>
        <div class="hero-meta">${songs.length} song${songs.length===1?"":"s"}</div>
      </div>
    </div>
    ${songs.length?renderSongTable(songs,isOwner,id):`<div class="empty-state"><p>${isLikedPl?"Songs you like appear here.":"This playlist is empty."}</p></div>`}
  `;
}

// ══════════════════════════════════════════════════════════════════════════════
// EVENT WIRING
// ══════════════════════════════════════════════════════════════════════════════
function wireApp(){
  const app=document.getElementById("app");

  // search
  document.getElementById("search-in")?.addEventListener("input",e=>{
    S.searchTerm=e.target.value;
    const pos=e.target.selectionStart;render();
    const ni=document.getElementById("search-in");if(ni){ni.focus();ni.setSelectionRange(pos,pos);}
  });

  // sign out / sign in
  document.getElementById("signout-btn")?.addEventListener("click",()=>{
    if(!S.profile){window.__guest=false;render();}else signOut();
  });

  // global click delegation
  app.addEventListener("click",handleClick);

  // drag-drop onto upload zone
  const uz=document.getElementById("upload-zone");
  const fi=document.getElementById("file-in");
  if(uz&&fi){
    uz.addEventListener("click",()=>fi.click());
    uz.addEventListener("dragover",e=>{e.preventDefault();uz.classList.add("drag");});
    uz.addEventListener("dragleave",()=>uz.classList.remove("drag"));
    uz.addEventListener("drop",e=>{e.preventDefault();uz.classList.remove("drag");if(e.dataTransfer.files.length)stageFiles(e.dataTransfer.files);});
  }
  if(fi)fi.addEventListener("change",e=>{if(e.target.files.length)stageFiles(e.target.files);e.target.value="";});

  // owner-wide drag-drop
  if(S.profile?.is_owner){
    document.body.ondragover=e=>e.preventDefault();
    document.body.ondrop=e=>{e.preventDefault();if(e.dataTransfer.files.length){S.view={screen:"upload"};stageFiles(e.dataTransfer.files);}};
  }else{document.body.ondragover=null;document.body.ondrop=null;}

  // staged card live-binding
  document.querySelectorAll("[data-staged]").forEach(card=>{
    const lid=card.dataset.staged;
    const e=S.stagedUploads.find(x=>x.localId===lid);if(!e)return;
    card.querySelector(".staged-title")?.addEventListener("input",ev=>e.title=ev.target.value);
    const artistInp=card.querySelector(".staged-artist");
    artistInp?.addEventListener("input",ev=>{e.artist=ev.target.value;render();});
    card.querySelector(".staged-album")?.addEventListener("input",ev=>e.album=ev.target.value);
    card.querySelector(".staged-features")?.addEventListener("input",ev=>e.features=ev.target.value);
  });

  // artist detail save buttons
  const saveBio=document.getElementById("save-bio");
  if(saveBio)saveBio.addEventListener("click",()=>{saveArtistBio(saveBio.dataset.id,document.getElementById("artist-bio").value);});
  const saveStreams=document.getElementById("save-streams");
  if(saveStreams)saveStreams.addEventListener("click",()=>{saveArtistStreams(saveStreams.dataset.id,parseInt(document.getElementById("artist-streams").value,10)||0);});

  // close dropdowns on outside click
  document.addEventListener("click",e=>{
    if(!e.target.closest(".menu-wrap")&&(S.songMenuFor||S.showTransMenu)){S.songMenuFor=null;S.showTransMenu=false;render();}
  },{capture:true,once:true});
}

function handleClick(e){
  const t=e.target.closest("[data-action],[data-go],[data-play],[data-liked],[data-menu],[data-trans],[data-bn],[data-confirm],[data-unstage],[data-cover-pick],[data-ac-artist],[data-addpl],[data-del],[data-rmpl],[data-rename],[data-play-list]");
  if(!t)return;

  if(t.dataset.go!==undefined){
    const scr=t.dataset.go,id=t.dataset.id;
    S.view=id?{screen:scr,id}:{screen:scr};
    if(scr==="home")S.mobileNav="home";
    else if(scr==="artists"||scr==="artist")S.mobileNav="artists";
    else if(scr==="albums"||scr==="album")S.mobileNav="albums";
    else if(scr==="upload")S.mobileNav="upload";
    else if(scr==="playlist")S.mobileNav="library";
    render();return;
  }
  if(t.dataset.bn!==undefined){
    const bn=t.dataset.bn;S.mobileNav=bn;
    if(bn==="home")S.view={screen:"home"};
    else if(bn==="artists")S.view={screen:"artists"};
    else if(bn==="albums")S.view={screen:"albums"};
    else if(bn==="upload")S.view={screen:"upload"};
    render();return;
  }
  if(t.dataset.play!==undefined){
    const id=t.dataset.play;
    const list=getSongListForContext();
    playSongList(list,id);return;
  }
  if(t.dataset.playList!==undefined){
    const albumSongs=S.songs.filter(s=>s.album_id===t.dataset.playList);
    if(albumSongs.length)playSongList(albumSongs,albumSongs[0].id);return;
  }
  if(t.dataset.liked!==undefined){toggleLiked(t.dataset.liked);return;}
  if(t.dataset.menu!==undefined){S.songMenuFor=S.songMenuFor===t.dataset.menu?null:t.dataset.menu;render();return;}
  if(t.dataset.trans!==undefined){S.transitionMode=t.dataset.trans;S.showTransMenu=false;render();return;}
  if(t.dataset.addpl!==undefined){addToPlaylist(t.dataset.addpl,t.dataset.sid);S.songMenuFor=null;return;}
  if(t.dataset.del!==undefined){S.songMenuFor=null;deleteSong(t.dataset.del);return;}
  if(t.dataset.rmpl!==undefined){
    const p=S.playlists.find(p=>p.id===t.dataset.rmpl);
    if(p){p.songIds=p.songIds.filter(s=>s!==t.dataset.sid);sb.from("playlist_songs").delete().eq("playlist_id",t.dataset.rmpl).eq("song_id",t.dataset.sid);}
    S.songMenuFor=null;render();return;
  }
  if(t.dataset.rename!==undefined){
    const p=S.playlists.find(p=>p.id===t.dataset.rename);
    const n=prompt("Rename playlist",p?.name||"");
    if(n&&n.trim())renamePlaylist(t.dataset.rename,n.trim());
    render();return;
  }
  if(t.dataset.confirm!==undefined){confirmUpload(t.dataset.confirm);return;}
  if(t.dataset.unstage!==undefined){S.stagedUploads=S.stagedUploads.filter(e=>e.localId!==t.dataset.unstage);render();return;}
  if(t.dataset.coverPick!==undefined){
    const ci=document.getElementById("cover-in-"+t.dataset.coverPick);
    if(ci)ci.click();
    ci?.addEventListener("change",ev=>{
      const f=ev.target.files[0];if(!f)return;
      const entry=S.stagedUploads.find(e=>e.localId===t.dataset.coverPick);
      if(!entry)return;
      entry.coverFile=f;
      entry.coverPreview=URL.createObjectURL(f);
      render();
    },{once:true});
    return;
  }
  if(t.dataset.acArtist!==undefined){
    const entry=S.stagedUploads.find(e=>e.localId===t.dataset.acArtist);
    if(entry){entry.artist=t.dataset.acName;render();}return;
  }

  const action=t.dataset.action;
  if(!action)return;
  switch(action){
    case"toggle-play":togglePlay();break;
    case"prev":handlePrev();break;
    case"next":handleNext(false);break;
    case"seek":seekTo(e);break;
    case"toggle-shuffle":S.shuffle=!S.shuffle;prepNext();render();break;
    case"toggle-repeat":S.repeat=!S.repeat;prepNext();render();break;
    case"toggle-mute":S.muted=!S.muted;applyVol();render();break;
    case"set-vol":{const r=t.getBoundingClientRect();S.volume=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));S.muted=false;applyVol();render();break;}
    case"toggle-trans":S.showTransMenu=!S.showTransMenu;render();break;
    case"open-np":S.nowPlayingOpen=true;render();break;
    case"close-np":S.nowPlayingOpen=false;render();break;
    case"new-playlist":createPlaylist();break;
    case"new-artist":{const n=prompt("New artist name");if(n?.trim())resolveArtist(n).then(()=>render());break;}
    case"del-artist":if(confirm("Delete this artist? Songs keep their text credits."))deleteArtist(t.dataset.id);break;
    case"del-album":if(confirm("Delete this album? Songs stay in the library."))deleteAlbum(t.dataset.id);break;
  }
}

function getSongListForContext(){
  const v=S.view;
  if(v.screen==="playlist"){const pl=S.playlists.find(p=>p.id===v.id);if(pl)return pl.songIds.map(id=>S.songs.find(s=>s.id===id)).filter(Boolean);}
  if(v.screen==="album")return S.songs.filter(s=>s.album_id===v.id);
  if(v.screen==="artist")return S.songs.filter(s=>s.primary_artist_id===v.id);
  if(S.searchTerm)return S.songs.filter(s=>s.title.toLowerCase().includes(S.searchTerm.toLowerCase())||s.artist.toLowerCase().includes(S.searchTerm.toLowerCase()));
  return S.songs;
}

init();
</script>
